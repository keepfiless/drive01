name: 09 - Download Google Drive Files

on:
  workflow_dispatch:
    inputs:
      drive_folder_url:
        description: 'Google Drive folder URL (public shared link)'
        required: true
        type: string

jobs:
  save-list:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Extract folder ID from URL
        id: extract_id
        run: |
          URL="${{ github.event.inputs.drive_folder_url }}"
          if [[ "$URL" =~ folders/([a-zA-Z0-9_-]+) ]]; then
            FOLDER_ID="${BASH_REMATCH[1]}"
          elif [[ "$URL" =~ id=([a-zA-Z0-9_-]+) ]]; then
            FOLDER_ID="${BASH_REMATCH[1]}"
          else
            FOLDER_ID="$URL"
          fi
          echo "folder_id=$FOLDER_ID" >> $GITHUB_OUTPUT
          echo "Extracted folder ID: $FOLDER_ID"

      - name: Scan Google Drive folder and save links to list.txt (NO DOWNLOAD)
        env:
          FOLDER_ID: ${{ steps.extract_id.outputs.folder_id }}
        run: |
          echo "=============================================="
          echo "Scanning Google Drive folder: $FOLDER_ID"
          echo "=============================================="

          python3 << 'EOF'
          import requests
          import re
          import os

          def get_folder_contents(folder_id, folder_name="root"):
              """Get list of files and subfolders from a Google Drive folder WITHOUT downloading."""
              results = []

              url = f"https://drive.google.com/drive/folders/{folder_id}"
              headers = {
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
              }

              try:
                  response = requests.get(url, headers=headers)
                  content = response.text

                  # Find all file entries - pattern: ["FILE_ID","FILE_NAME"
                  # Google Drive embeds file data in JavaScript
                  file_pattern = r'\["([a-zA-Z0-9_-]{20,})","([^"]+)"'
                  matches = re.findall(file_pattern, content)

                  seen_ids = set()
                  for file_id, file_name in matches:
                      if file_id not in seen_ids and len(file_id) > 25:
                          seen_ids.add(file_id)
                          # Check if it's a folder or file by trying to detect folder pattern
                          if not file_name.startswith("http") and "." in file_name:
                              download_link = f"https://drive.google.com/uc?id={file_id}&export=download"
                              results.append((folder_name, file_id, file_name, download_link))

                  # Also try to find subfolders and recurse
                  folder_pattern = r'data-id="([a-zA-Z0-9_-]{20,})"[^>]*>([^<]+)</div'

              except Exception as e:
                  print(f"Error scanning folder {folder_id}: {e}")

              return results

          def scan_with_gdown_api(folder_id):
              """Use gdown's internal API to list files without downloading."""
              import json

              results = []
              folders_to_scan = [(folder_id, "root")]

              while folders_to_scan:
                  current_folder_id, current_folder_name = folders_to_scan.pop(0)

                  # Use Google Drive's folder listing API
                  url = "https://drive.google.com/drive/folders/" + current_folder_id

                  try:
                      headers = {"User-Agent": "Mozilla/5.0"}
                      resp = requests.get(url, headers=headers)

                      # Extract file IDs and names from the page
                      # Pattern for files: data-id="FILE_ID"
                      id_pattern = r'data-id="([a-zA-Z0-9_-]{25,})"'
                      ids = re.findall(id_pattern, resp.text)

                      # Pattern for names after data-id
                      for fid in set(ids):
                          if fid != current_folder_id:
                              # Try to determine if folder or file
                              check_url = f"https://drive.google.com/file/d/{fid}/view"
                              check_resp = requests.head(check_url, headers=headers, allow_redirects=True)

                              if "folder" in check_resp.url:
                                  # It's a subfolder - get its name and add to scan queue
                                  name_match = re.search(rf'{fid}[^>]*>([^<]+)<', resp.text)
                                  subfolder_name = name_match.group(1) if name_match else fid
                                  folders_to_scan.append((fid, subfolder_name))
                              else:
                                  # It's a file
                                  download_link = f"https://drive.google.com/uc?id={fid}&export=download"
                                  results.append((current_folder_name, download_link))

                  except Exception as e:
                      print(f"Error: {e}")
                      continue

              return results

          def simple_scan(folder_id):
              """Simple scan using direct API approach."""
              import urllib.request
              import json

              results = []
              folders_to_process = [(folder_id, "root")]
              processed_folders = set()

              while folders_to_process:
                  fid, fname = folders_to_process.pop(0)
                  if fid in processed_folders:
                      continue
                  processed_folders.add(fid)

                  print(f"Scanning folder: {fname} ({fid})")

                  # Use the embeddedfolderview endpoint
                  url = f"https://drive.google.com/embeddedfolderview?id={fid}"
                  headers = {"User-Agent": "Mozilla/5.0"}

                  try:
                      req = urllib.request.Request(url, headers=headers)
                      with urllib.request.urlopen(req, timeout=30) as response:
                          content = response.read().decode('utf-8', errors='ignore')

                      # Find flip entries which contain file/folder info
                      # Pattern: ["ITEM_ID","ITEM_NAME","..."]
                      pattern = r'\["(1[a-zA-Z0-9_-]{30,})","([^"]*)"'
                      matches = re.findall(pattern, content)

                      seen = set()
                      for item_id, item_name in matches:
                          if item_id in seen or not item_name:
                              continue
                          seen.add(item_id)

                          # Determine if file or folder by checking if name has extension
                          if '.' in item_name and len(item_name.split('.')[-1]) <= 5:
                              # Likely a file
                              download_link = f"https://drive.google.com/uc?id={item_id}&export=download"
                              results.append((fname, download_link))
                              print(f"  Found file: {item_name}")
                          else:
                              # Might be a folder - add to queue
                              folders_to_process.append((item_id, item_name))
                              print(f"  Found subfolder: {item_name}")

                  except Exception as e:
                      print(f"Error scanning {fname}: {e}")

              return results

          # Main execution
          folder_id = os.environ.get('FOLDER_ID')
          print(f"Starting scan of folder: {folder_id}")

          results = simple_scan(folder_id)

          # Write to list.txt
          with open('list.txt', 'w') as f:
              for folder_name, download_link in results:
                  f.write(f"{folder_name} --- {download_link}\n")

          print(f"\nTotal files found: {len(results)}")
          EOF

          FILE_COUNT=$(wc -l < list.txt 2>/dev/null || echo "0")
          echo ""
          echo "=============================================="
          echo "Scan completed! Saved $FILE_COUNT links to list.txt"
          echo "=============================================="

      - name: Display list.txt content
        run: |
          echo "=== list.txt content ==="
          cat list.txt

      - name: Commit list.txt to repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add --force list.txt

          if git diff --staged --quiet; then
            echo "No changes to list.txt"
          else
            git commit -m "📋 Generated list.txt with download links"
            git push

            echo ""
            echo "=============================================="
            echo "Successfully committed list.txt!"
            echo "=============================================="
          fi

  get-files:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    needs: save-list

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Pull latest changes
        run: git pull origin main || git pull origin master || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install gdown
        run: pip install gdown

      - name: Create downloads directory
        run: mkdir -p downloads

      - name: Download files from list.txt
        run: |
          echo "=============================================="
          echo "Downloading files from list.txt"
          echo "=============================================="

          if [[ ! -f list.txt ]]; then
            echo "Error: list.txt not found!"
            exit 1
          fi

          while IFS= read -r line; do
            # Parse: FOLDER_NAME --- URL
            FOLDER_NAME=$(echo "$line" | sed 's/ --- .*//')
            URL=$(echo "$line" | sed 's/.* --- //')

            if [[ -z "$URL" || -z "$FOLDER_NAME" ]]; then
              continue
            fi

            # Extract file ID from URL
            FILE_ID=$(echo "$URL" | grep -oP 'id=\K[a-zA-Z0-9_-]+')

            # Create folder if not exists
            if [[ "$FOLDER_NAME" != "root" ]]; then
              mkdir -p "downloads/$FOLDER_NAME"
              DOWNLOAD_DIR="downloads/$FOLDER_NAME"
            else
              DOWNLOAD_DIR="downloads"
            fi

            echo "Downloading to $DOWNLOAD_DIR (File ID: $FILE_ID)"

            # Download using gdown (handles Google Drive auth properly)
            cd "$DOWNLOAD_DIR"
            gdown --fuzzy "$URL" || \
              gdown "https://drive.google.com/uc?id=${FILE_ID}" || \
              wget --content-disposition "$URL" -q || \
              echo "Warning: Failed to download $FILE_ID"
            cd - > /dev/null

          done < list.txt

          echo ""
          echo "=============================================="
          echo "Download completed!"
          echo "=============================================="

      - name: Generate README.md for each folder
        run: |
          find downloads -mindepth 1 -type d | while read -r folder; do
            folder_name=$(basename "$folder")
            readme_path="$folder/README.md"

            echo "Creating README.md for: $folder_name"

            echo "# $folder_name" > "$readme_path"
            echo "" >> "$readme_path"
            echo "## Files" >> "$readme_path"
            echo "" >> "$readme_path"
            echo "| File | Download |" >> "$readme_path"
            echo "|------|----------|" >> "$readme_path"

            find "$folder" -maxdepth 1 -type f ! -name "README.md" | sort -V | while read -r file; do
              filename=$(basename "$file")
              echo "| $filename | [Download]($filename) |" >> "$readme_path"
            done

            echo "" >> "$readme_path"
            echo "---" >> "$readme_path"
            echo "_Auto-generated by GitHub Actions_" >> "$readme_path"
          done

          echo "README.md files created for all folders"

      - name: Display download summary
        run: |
          echo "=== Download Summary ==="
          echo "Total size:"
          du -sh downloads/ 2>/dev/null || echo "No files downloaded yet"
          echo ""
          echo "Folder structure:"
          find downloads -type d 2>/dev/null || echo "No folders yet"
          echo ""
          echo "Total files downloaded:"
          find downloads -type f 2>/dev/null | wc -l
          echo ""
          echo "If not all files were downloaded (rate limited),"
          echo "run this workflow again to continue downloading."

      - name: Commit and push files to repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add --force downloads/

          if git diff --staged --quiet; then
            echo "No new files to commit"
          else
            FILE_COUNT=$(find downloads -type f ! -name "README.md" | wc -l)
            FOLDER_COUNT=$(find downloads -mindepth 1 -type d | wc -l)

            git commit -m "📥 Downloaded $FILE_COUNT files in $FOLDER_COUNT folders from Google Drive"
            git push

            echo ""
            echo "=============================================="
            echo "Successfully committed $FILE_COUNT files!"
            echo "=============================================="
          fi
