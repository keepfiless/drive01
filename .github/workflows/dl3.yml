name: 03 -Download Google Drive Folder

on:
  workflow_dispatch:
    inputs:
      drive_folder_url:
        description: 'Google Drive Folder URL (e.g., https://drive.google.com/drive/folders/FOLDER_ID)'
        required: true
        type: string
      folder_name:
        description: 'Custom folder name (optional - leave empty to auto-generate)'
        required: false
        type: string
        default: ''

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade gdown requests beautifulsoup4

      - name: Extract Folder ID and Download Files Recursively
        id: download
        run: |
          python << 'EOF'
          import os
          import re
          import sys
          import json
          import gdown
          import requests
          from pathlib import Path
          from bs4 import BeautifulSoup

          # Get the folder URL from input
          folder_url = "${{ github.event.inputs.drive_folder_url }}"
          custom_folder_name = "${{ github.event.inputs.folder_name }}".strip()

          # Extract folder ID from URL
          folder_id_match = re.search(r'folders/([a-zA-Z0-9_-]+)', folder_url)
          if not folder_id_match:
              folder_id_match = re.search(r'id=([a-zA-Z0-9_-]+)', folder_url)

          if not folder_id_match:
              print("Error: Could not extract folder ID from URL")
              sys.exit(1)

          root_folder_id = folder_id_match.group(1)
          print(f"Root Folder ID: {root_folder_id}")

          # Create download directory with sanitized name
          if custom_folder_name:
              safe_name = re.sub(r'[<>:"/\\|?*$&]', '_', custom_folder_name)
              base_download_dir = f"downloads/{safe_name}"
          else:
              base_download_dir = f"downloads/drive_folder_{root_folder_id[:8]}"

          Path(base_download_dir).mkdir(parents=True, exist_ok=True)
          print(f"Base download directory: {base_download_dir}")

          # Session for requests
          session = requests.Session()
          session.headers.update({
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36'
          })

          downloaded_count = 0
          failed_count = 0
          failed_files = []
          processed_folders = set()
          processed_files = set()

          def get_folder_contents(folder_id):
              """Get folder contents using Google Drive's export API"""
              files = []
              folders = []

              try:
                  # Use gdown's internal method to get folder contents
                  url = f"https://drive.google.com/drive/folders/{folder_id}"

                  # Try to get folder contents via the webpage
                  response = session.get(url, timeout=30)

                  if response.status_code != 200:
                      print(f"    Warning: Could not access folder (status {response.status_code})")
                      return files, folders

                  html = response.text

                  # Method 1: Look for data in script tags (Google embeds JSON data)
                  # Find all script tags that might contain file data
                  script_pattern = r'\["([a-zA-Z0-9_-]{20,})"[^\]]*"([^"]+)"[^\]]*"(application/vnd\.google-apps\.folder|[^"]+)"'
                  matches = re.findall(script_pattern, html)

                  for match in matches:
                      item_id, name, mime_type = match
                      if item_id != folder_id:  # Skip current folder
                          if 'folder' in mime_type.lower():
                              folders.append({'id': item_id, 'name': name})
                          else:
                              files.append({'id': item_id, 'name': name})

                  # Method 2: Alternative pattern for newer Google Drive pages
                  if not files and not folders:
                      # Look for file entries in the page
                      file_pattern = r'data-id="([a-zA-Z0-9_-]{20,})"[^>]*>([^<]+)<'
                      matches = re.findall(file_pattern, html)
                      for item_id, name in matches:
                          if item_id != folder_id:
                              files.append({'id': item_id, 'name': name.strip()})

                  # Method 3: Try parsing embedded JSON data
                  if not files and not folders:
                      # Look for JSON-like structures with file info
                      json_pattern = r'\[(?:"[a-zA-Z0-9_-]{25,}"[,\s]*){1,}'

                      # Extract IDs that look like Drive file/folder IDs
                      all_ids = re.findall(r'"([a-zA-Z0-9_-]{25,45})"', html)
                      unique_ids = list(dict.fromkeys(all_ids))

                      # Filter out the current folder and common false positives
                      for item_id in unique_ids:
                          if item_id != folder_id and len(item_id) >= 25 and len(item_id) <= 45:
                              # Try to determine if it's a file or folder by checking the URL
                              check_url = f"https://drive.google.com/file/d/{item_id}/view"
                              try:
                                  check_resp = session.head(check_url, allow_redirects=True, timeout=5)
                                  if check_resp.status_code == 200:
                                      files.append({'id': item_id, 'name': f'file_{item_id[:8]}'})
                                  else:
                                      # Might be a folder
                                      folder_check = f"https://drive.google.com/drive/folders/{item_id}"
                                      folder_resp = session.head(folder_check, allow_redirects=True, timeout=5)
                                      if folder_resp.status_code == 200:
                                          folders.append({'id': item_id, 'name': f'folder_{item_id[:8]}'})
                              except:
                                  pass

                              # Limit checks to avoid too many requests
                              if len(files) + len(folders) >= 50:
                                  break

              except Exception as e:
                  print(f"    Warning: Error scanning folder: {e}")

              return files, folders

          def download_file(file_id, file_name, target_dir):
              """Download a single file to target directory"""
              global downloaded_count, failed_count, failed_files

              if file_id in processed_files:
                  return
              processed_files.add(file_id)

              try:
                  file_url = f"https://drive.google.com/uc?id={file_id}&confirm=t"
                  output_path = os.path.join(target_dir, "")

                  output = gdown.download(
                      file_url,
                      output=output_path,
                      quiet=False,
                      fuzzy=True
                  )

                  if output and os.path.exists(output):
                      file_size = os.path.getsize(output)
                      print(f"      ✓ Downloaded: {os.path.basename(output)} ({file_size} bytes)")
                      downloaded_count += 1
                  else:
                      print(f"      ✗ Download returned no file")
                      failed_count += 1
                      failed_files.append(file_id)

              except Exception as e:
                  print(f"      ✗ Failed: {e}")
                  failed_count += 1
                  failed_files.append(file_id)

          def process_folder_recursive(folder_id, current_path, folder_name="root", depth=0):
              """Recursively process folder and all subfolders"""
              global processed_folders, downloaded_count

              if folder_id in processed_folders:
                  return
              processed_folders.add(folder_id)

              indent = "  " * depth
              print(f"\n{indent}📁 [{folder_name}] (ID: {folder_id[:12]}...)")
              print(f"{indent}   Path: {current_path}")

              # Ensure directory exists
              Path(current_path).mkdir(parents=True, exist_ok=True)

              # Get folder contents
              files, subfolders = get_folder_contents(folder_id)

              print(f"{indent}   Found {len(files)} files, {len(subfolders)} subfolders")

              # Download files in current folder
              for i, file_info in enumerate(files, 1):
                  file_id = file_info['id']
                  file_name = file_info.get('name', f'file_{file_id[:8]}')
                  if file_id not in processed_files:
                      print(f"{indent}   [{i}/{len(files)}] Downloading: {file_name}")
                      download_file(file_id, file_name, current_path)

              # Process subfolders recursively
              for subfolder_info in subfolders:
                  subfolder_id = subfolder_info['id']
                  subfolder_name = subfolder_info.get('name', f'folder_{subfolder_id[:8]}')
                  # Sanitize folder name
                  safe_subfolder_name = re.sub(r'[<>:"/\\|?*$&]', '_', subfolder_name)

                  if subfolder_id not in processed_folders:
                      subfolder_path = os.path.join(current_path, safe_subfolder_name)
                      process_folder_recursive(subfolder_id, subfolder_path, subfolder_name, depth + 1)

          def download_with_gdown_folder(folder_id, output_dir):
              """Use gdown's built-in folder download as primary method"""
              global downloaded_count

              print(f"\nUsing gdown.download_folder() for recursive download...")
              url = f"https://drive.google.com/drive/folders/{folder_id}"

              try:
                  gdown.download_folder(url=url, output=output_dir, quiet=False)

                  # Count downloaded files
                  downloaded_files = list(Path(output_dir).rglob('*'))
                  file_count = len([f for f in downloaded_files if f.is_file()])
                  downloaded_count = file_count

                  print(f"\n✓ gdown.download_folder completed: {file_count} files")
                  return True

              except Exception as e:
                  print(f"gdown.download_folder() failed: {e}")
                  return False

          # Start download process
          print("=" * 60)
          print("STARTING RECURSIVE FOLDER DOWNLOAD")
          print("=" * 60)
          print(f"Root URL: https://drive.google.com/drive/folders/{root_folder_id}")
          print(f"Destination: {base_download_dir}")
          print("=" * 60)

          # Try gdown.download_folder first (most reliable for public folders)
          success = download_with_gdown_folder(root_folder_id, base_download_dir)

          # If gdown folder download fails or gets 0 files, try manual scanning
          if not success or downloaded_count == 0:
              print("\n" + "=" * 60)
              print("Trying manual recursive scan method...")
              print("=" * 60)
              downloaded_count = 0  # Reset counter
              processed_folders.clear()
              processed_files.clear()
              process_folder_recursive(root_folder_id, base_download_dir, "root")

          # Final summary
          print("")
          print("=" * 60)
          print("DOWNLOAD SUMMARY")
          print("=" * 60)
          print(f"📁 Folders processed: {len(processed_folders) if processed_folders else 1}")
          print(f"✓ Successfully downloaded: {downloaded_count} files")
          print(f"✗ Failed: {failed_count} files")

          if failed_files:
              print(f"\nFailed file IDs:")
              for fid in failed_files[:10]:
                  print(f"  - https://drive.google.com/file/d/{fid}")
              if len(failed_files) > 10:
                  print(f"  ... and {len(failed_files) - 10} more")

          # List all downloaded files with folder structure
          print(f"\n📂 Folder structure in {base_download_dir}:")
          for f in sorted(Path(base_download_dir).rglob('*')):
              rel_path = f.relative_to(base_download_dir)
              if f.is_dir():
                  print(f"  📁 {rel_path}/")
              elif f.is_file():
                  size_mb = f.stat().st_size / (1024 * 1024)
                  print(f"  📄 {rel_path} ({size_mb:.2f} MB)")

          # Write output for next steps
          folders_processed = len(processed_folders) if processed_folders else 1
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"download_dir={base_download_dir}\n")
              f.write(f"downloaded_count={downloaded_count}\n")
              f.write(f"failed_count={failed_count}\n")
              f.write(f"folders_processed={folders_processed}\n")

          # Only fail if NO files were downloaded
          if downloaded_count == 0:
              print("\n❌ ERROR: No files were downloaded!")
              print("\nTroubleshooting:")
              print("1. Make sure the Google Drive folder is publicly shared")
              print("   (Right-click folder → Share → Anyone with the link)")
              print("2. The folder might be empty")
              print("3. Files might require special permissions")
              sys.exit(1)
          else:
              print(f"\n✅ Download completed! {downloaded_count} files from {folders_processed} folders ready to commit.")

          EOF

      - name: List downloaded files
        run: |
          echo "📁 Downloaded files with folder structure:"
          if [ -d "downloads" ]; then
            find downloads -type d -exec echo "📁 {}" \;
            find downloads -type f -exec ls -lh {} \;
            echo ""
            echo "Total size:"
            du -sh downloads/
          else
            echo "No downloads folder found"
          fi

      - name: Commit and push files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Configure git for large files
          git config --local http.postBuffer 524288000

          # Add all downloaded files
          git add downloads/

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No new files to commit"
          else
            git commit -m "📥 Downloaded ${{ steps.download.outputs.downloaded_count }} files from ${{ steps.download.outputs.folders_processed }} folders (Google Drive)"
            git push
            echo "✅ Files committed and pushed successfully!"
          fi

      - name: Summary
        run: |
          echo "## 📥 Recursive Download Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Source:** ${{ github.event.inputs.drive_folder_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📁 Folders Processed | ${{ steps.download.outputs.folders_processed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ✓ Files Downloaded | ${{ steps.download.outputs.downloaded_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ✗ Failed | ${{ steps.download.outputs.failed_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Saved to:** \`${{ steps.download.outputs.download_dir }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Folder Structure:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          find downloads -type d 2>/dev/null | head -20 >> $GITHUB_STEP_SUMMARY || echo "No folders found"
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Files:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          find downloads -type f -exec ls -lh {} \; 2>/dev/null | head -50 >> $GITHUB_STEP_SUMMARY || echo "No files found"
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
