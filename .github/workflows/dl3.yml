name: 03 -Download Google Drive Folder

on:
  workflow_dispatch:
    inputs:
      drive_folder_url:
        description: 'Google Drive Folder URL (e.g., https://drive.google.com/drive/folders/FOLDER_ID)'
        required: true
        type: string
      folder_name:
        description: 'Custom folder name (optional - leave empty to auto-generate)'
        required: false
        type: string
        default: ''

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade gdown requests

      - name: Extract Folder ID and Download Files Recursively
        id: download
        run: |
          python << 'EOF'
          import os
          import re
          import sys
          import gdown
          import requests
          from pathlib import Path
          from collections import deque

          # Get the folder URL from input
          folder_url = "${{ github.event.inputs.drive_folder_url }}"
          custom_folder_name = "${{ github.event.inputs.folder_name }}".strip()

          # Extract folder ID from URL
          folder_id_match = re.search(r'folders/([a-zA-Z0-9_-]+)', folder_url)
          if not folder_id_match:
              folder_id_match = re.search(r'id=([a-zA-Z0-9_-]+)', folder_url)

          if not folder_id_match:
              print("Error: Could not extract folder ID from URL")
              sys.exit(1)

          root_folder_id = folder_id_match.group(1)
          print(f"Root Folder ID: {root_folder_id}")

          # Create download directory with sanitized name
          if custom_folder_name:
              safe_name = re.sub(r'[<>:"/\\|?*&]', '_', custom_folder_name)
              base_download_dir = f"downloads/{safe_name}"
          else:
              base_download_dir = f"downloads/drive_folder_{root_folder_id[:8]}"

          Path(base_download_dir).mkdir(parents=True, exist_ok=True)
          print(f"Base download directory: {base_download_dir}")

          # Session for requests
          session = requests.Session()
          session.headers.update({
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
          })

          downloaded_count = 0
          failed_count = 0
          failed_files = []
          processed_folders = set()
          processed_files = set()

          def get_folder_name(folder_id):
              """Try to get folder name from Google Drive page"""
              try:
                  url = f"https://drive.google.com/drive/folders/{folder_id}"
                  response = session.get(url, timeout=30)
                  # Try to extract folder name from title
                  title_match = re.search(r'<title>([^<]+)</title>', response.text)
                  if title_match:
                      title = title_match.group(1)
                      # Remove " - Google Drive" suffix
                      title = re.sub(r'\s*-\s*Google Drive\s*$', '', title)
                      if title and title != "Google Drive":
                          # Sanitize folder name
                          safe_title = re.sub(r'[<>:"/\\|?*&]', '_', title)
                          return safe_title
              except:
                  pass
              return None

          def scan_folder(folder_id):
              """Scan a Google Drive folder and return file IDs and subfolder IDs"""
              url = f"https://drive.google.com/drive/folders/{folder_id}"
              file_ids = []
              subfolder_ids = []

              try:
                  response = session.get(url, timeout=30)

                  # Find all file IDs in the page
                  found_files = re.findall(r'/file/d/([a-zA-Z0-9_-]+)', response.text)
                  file_ids = list(dict.fromkeys(found_files))  # Remove duplicates

                  # Find all subfolder IDs in the page (exclude the current folder)
                  found_folders = re.findall(r'/folders/([a-zA-Z0-9_-]+)', response.text)
                  found_folders = list(dict.fromkeys(found_folders))
                  subfolder_ids = [f for f in found_folders if f != folder_id]

              except Exception as e:
                  print(f"  Warning: Could not scan folder {folder_id}: {e}")

              return file_ids, subfolder_ids

          def download_file(file_id, target_dir):
              """Download a single file to target directory"""
              global downloaded_count, failed_count, failed_files

              if file_id in processed_files:
                  return
              processed_files.add(file_id)

              try:
                  file_url = f"https://drive.google.com/uc?id={file_id}&confirm=t"
                  output = gdown.download(
                      file_url,
                      output=f"{target_dir}/",
                      quiet=False,
                      fuzzy=True
                  )

                  if output and os.path.exists(output):
                      file_size = os.path.getsize(output)
                      print(f"    ✓ Downloaded: {os.path.basename(output)} ({file_size} bytes)")
                      downloaded_count += 1
                  else:
                      print(f"    ✗ Download returned no file")
                      failed_count += 1
                      failed_files.append(file_id)

              except Exception as e:
                  print(f"    ✗ Failed: {e}")
                  failed_count += 1
                  failed_files.append(file_id)

          def process_folder_recursive(folder_id, current_path, depth=0):
              """Recursively process folder and all subfolders"""
              global processed_folders

              if folder_id in processed_folders:
                  return
              processed_folders.add(folder_id)

              indent = "  " * depth
              print(f"\n{indent}📁 Processing folder: {folder_id}")
              print(f"{indent}   Path: {current_path}")

              # Ensure directory exists
              Path(current_path).mkdir(parents=True, exist_ok=True)

              # Scan folder for files and subfolders
              file_ids, subfolder_ids = scan_folder(folder_id)

              print(f"{indent}   Found {len(file_ids)} files, {len(subfolder_ids)} subfolders")

              # Download files in current folder
              for i, file_id in enumerate(file_ids, 1):
                  if file_id not in processed_files:
                      print(f"{indent}   [{i}/{len(file_ids)}] Downloading file: {file_id}")
                      download_file(file_id, current_path)

              # Process subfolders recursively
              for subfolder_id in subfolder_ids:
                  if subfolder_id not in processed_folders:
                      # Try to get folder name
                      folder_name = get_folder_name(subfolder_id)
                      if not folder_name:
                          folder_name = f"folder_{subfolder_id[:8]}"

                      subfolder_path = os.path.join(current_path, folder_name)
                      process_folder_recursive(subfolder_id, subfolder_path, depth + 1)

          # Start recursive download
          print("=" * 60)
          print("STARTING RECURSIVE FOLDER DOWNLOAD")
          print("=" * 60)
          print(f"Root URL: https://drive.google.com/drive/folders/{root_folder_id}")
          print(f"Destination: {base_download_dir}")
          print("=" * 60)

          # Process the root folder and all subfolders
          process_folder_recursive(root_folder_id, base_download_dir)

          # If no files found with scanning, try gdown.download_folder as fallback
          if downloaded_count == 0:
              print("\n" + "=" * 60)
              print("No files found with scanning, trying gdown.download_folder()...")
              print("=" * 60)
              try:
                  url = f"https://drive.google.com/drive/folders/{root_folder_id}"
                  gdown.download_folder(url=url, output=base_download_dir, quiet=False, remaining_ok=True)
                  downloaded_files = list(Path(base_download_dir).rglob('*'))
                  downloaded_count = len([f for f in downloaded_files if f.is_file()])
              except Exception as e:
                  print(f"Folder download failed: {e}")

          # Final summary
          print("")
          print("=" * 60)
          print("DOWNLOAD SUMMARY")
          print("=" * 60)
          print(f"📁 Folders processed: {len(processed_folders)}")
          print(f"✓ Successfully downloaded: {downloaded_count} files")
          print(f"✗ Failed: {failed_count} files")

          if failed_files:
              print(f"\nFailed file IDs:")
              for fid in failed_files[:10]:  # Show first 10
                  print(f"  - https://drive.google.com/file/d/{fid}")
              if len(failed_files) > 10:
                  print(f"  ... and {len(failed_files) - 10} more")

          # List all downloaded files with folder structure
          print(f"\n📂 Folder structure in {base_download_dir}:")
          for f in sorted(Path(base_download_dir).rglob('*')):
              if f.is_file():
                  rel_path = f.relative_to(base_download_dir)
                  size_mb = f.stat().st_size / (1024 * 1024)
                  print(f"  📄 {rel_path} ({size_mb:.2f} MB)")
              elif f.is_dir():
                  rel_path = f.relative_to(base_download_dir)
                  print(f"  📁 {rel_path}/")

          # Write output for next steps
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"download_dir={base_download_dir}\n")
              f.write(f"downloaded_count={downloaded_count}\n")
              f.write(f"failed_count={failed_count}\n")
              f.write(f"folders_processed={len(processed_folders)}\n")

          # Only fail if NO files were downloaded
          if downloaded_count == 0:
              print("\n❌ ERROR: No files were downloaded!")
              print("Make sure the Google Drive folder is publicly shared.")
              sys.exit(1)
          else:
              print(f"\n✅ Download completed! {downloaded_count} files from {len(processed_folders)} folders ready to commit.")

          EOF

      - name: List downloaded files
        run: |
          echo "📁 Downloaded files with folder structure:"
          if [ -d "downloads" ]; then
            find downloads -type d -exec echo "📁 {}" \;
            find downloads -type f -exec ls -lh {} \;
            echo ""
            echo "Total size:"
            du -sh downloads/
          else
            echo "No downloads folder found"
          fi

      - name: Commit and push files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Configure git for large files
          git config --local http.postBuffer 524288000

          # Add all downloaded files
          git add downloads/

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No new files to commit"
          else
            git commit -m "📥 Downloaded ${{ steps.download.outputs.downloaded_count }} files from ${{ steps.download.outputs.folders_processed }} folders (Google Drive)"
            git push
            echo "✅ Files committed and pushed successfully!"
          fi

      - name: Summary
        run: |
          echo "## 📥 Recursive Download Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Source:** ${{ github.event.inputs.drive_folder_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📁 Folders Processed | ${{ steps.download.outputs.folders_processed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ✓ Files Downloaded | ${{ steps.download.outputs.downloaded_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ✗ Failed | ${{ steps.download.outputs.failed_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Saved to:** \`${{ steps.download.outputs.download_dir }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Folder Structure:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          find downloads -type d 2>/dev/null | head -20 >> $GITHUB_STEP_SUMMARY || echo "No folders found"
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Files:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          find downloads -type f -exec ls -lh {} \; 2>/dev/null | head -50 >> $GITHUB_STEP_SUMMARY || echo "No files found"
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
