name: 03- Download Google Drive Folder Recursively

on:
  workflow_dispatch:
    inputs:
      folder_url:
        description: 'Google Drive Folder URL'
        required: true
        type: string
      output_path:
        description: 'Output directory path'
        required: false
        default: 'downloads'
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade gdown requests beautifulsoup4

      - name: Download all files recursively
        env:
          FOLDER_URL: ${{ github.event.inputs.folder_url }}
          OUTPUT_PATH: ${{ github.event.inputs.output_path }}
        run: |
          python3 << 'EOF'
          import os
          import re
          import sys
          import gdown
          import requests
          from pathlib import Path
          from bs4 import BeautifulSoup
          import json
          import time

          def extract_folder_id(url):
              """Extract folder ID from Google Drive URL"""
              if 'folders/' in url:
                  match = re.search(r'folders/([a-zA-Z0-9_-]+)', url)
                  if match:
                      return match.group(1)
              if 'id=' in url:
                  match = re.search(r'id=([a-zA-Z0-9_-]+)', url)
                  if match:
                      return match.group(1)
              if re.match(r'^[a-zA-Z0-9_-]+$', url):
                  return url
              return None

          def sanitize_filename(name):
              """Remove invalid characters from filename"""
              invalid_chars = '<>:"/\\|?*'
              for char in invalid_chars:
                  name = name.replace(char, '_')
              return name.strip()

          def get_folder_contents_via_gdown(folder_id):
              """
              Use gdown's internal API to list folder contents.
              This returns ALL items in the folder.
              """
              try:
                  from gdown.download_folder import _get_folder_list
                  items = _get_folder_list(folder_id)
                  return items if items else []
              except Exception as e:
                  print(f"    gdown._get_folder_list error: {e}")
                  return []

          def download_file_gdown(file_id, output_path, filename):
              """Download a single file using gdown"""
              try:
                  safe_name = sanitize_filename(filename)
                  full_path = os.path.join(output_path, safe_name)

                  # Skip if exists
                  if os.path.exists(full_path):
                      print(f"      ⏭ Already exists: {safe_name}")
                      return True

                  url = f"https://drive.google.com/uc?id={file_id}"
                  result = gdown.download(url, output=full_path, quiet=True, fuzzy=True)

                  if result and os.path.exists(full_path):
                      size_mb = os.path.getsize(full_path) / (1024 * 1024)
                      print(f"      ✓ Downloaded: {safe_name} ({size_mb:.2f} MB)")
                      return True
                  else:
                      print(f"      ✗ Failed: {safe_name}")
                      return False
              except Exception as e:
                  print(f"      ✗ Error downloading {filename}: {e}")
                  return False

          def download_folder_recursive(folder_id, output_path, depth=0, max_depth=15):
              """
              Recursively download ALL contents from a Google Drive folder.
              Processes ALL folders and files at each level.
              """
              if depth > max_depth:
                  print(f"{'  ' * depth}⚠ Max depth {max_depth} reached")
                  return 0, 0

              indent = "  " * depth
              downloaded = 0
              failed = 0

              # Create directory
              Path(output_path).mkdir(parents=True, exist_ok=True)

              print(f"{indent}📁 Scanning folder: {folder_id[:12]}... (depth {depth})")

              # Get ALL items in this folder
              items = get_folder_contents_via_gdown(folder_id)

              if not items:
                  print(f"{indent}   ⚠ No items found or unable to list folder")
                  # Try alternative: use gdown.download_folder directly
                  print(f"{indent}   Trying gdown.download_folder()...")
                  try:
                      url = f"https://drive.google.com/drive/folders/{folder_id}"
                      gdown.download_folder(url=url, output=output_path, quiet=False)
                      # Count files downloaded
                      for root, dirs, files in os.walk(output_path):
                          downloaded += len(files)
                      return downloaded, 0
                  except Exception as e:
                      print(f"{indent}   gdown.download_folder error: {e}")
                      return 0, 0

              print(f"{indent}   Found {len(items)} items")

              # Process EVERY item in the folder
              for i, item in enumerate(items):
                  item_id = item.get('id', '')
                  item_name = item.get('name', f'item_{i}')
                  item_type = item.get('mimeType', '')

                  safe_name = sanitize_filename(item_name)

                  # Check if it's a folder
                  is_folder = 'folder' in item_type.lower()

                  if is_folder:
                      # It's a FOLDER - recurse into it
                      print(f"{indent}   📁 [{i+1}/{len(items)}] Folder: {safe_name}/")
                      subfolder_path = os.path.join(output_path, safe_name)

                      # RECURSIVE CALL - this processes the subfolder
                      sub_downloaded, sub_failed = download_folder_recursive(
                          item_id,
                          subfolder_path,
                          depth + 1,
                          max_depth
                      )
                      downloaded += sub_downloaded
                      failed += sub_failed
                  else:
                      # It's a FILE - download it
                      print(f"{indent}   📄 [{i+1}/{len(items)}] File: {safe_name}")
                      if download_file_gdown(item_id, output_path, item_name):
                          downloaded += 1
                      else:
                          failed += 1

                  # Small delay to avoid rate limiting
                  time.sleep(0.2)

              return downloaded, failed

          def main():
              folder_url = os.environ.get('FOLDER_URL', '')
              output_path = os.environ.get('OUTPUT_PATH', 'downloads')

              if not folder_url:
                  print("Error: No folder URL provided")
                  return 1

              folder_id = extract_folder_id(folder_url)

              if not folder_id:
                  print(f"Error: Could not extract folder ID from: {folder_url}")
                  return 1

              print("=" * 70)
              print("Google Drive Recursive Folder Downloader")
              print("=" * 70)
              print(f"Folder URL: {folder_url}")
              print(f"Folder ID:  {folder_id}")
              print(f"Output:     {output_path}")
              print("=" * 70)
              print()

              # Start recursive download
              downloaded, failed = download_folder_recursive(folder_id, output_path)

              # Print summary
              print()
              print("=" * 70)
              print("DOWNLOAD SUMMARY")
              print("=" * 70)

              # Count actual files
              total_files = 0
              total_size = 0
              for root, dirs, files in os.walk(output_path):
                  for f in files:
                      filepath = os.path.join(root, f)
                      total_files += 1
                      total_size += os.path.getsize(filepath)

              print(f"✓ Files downloaded: {total_files}")
              print(f"✗ Failed: {failed}")
              print(f"📦 Total size: {total_size / (1024*1024):.2f} MB")
              print()

              # Show folder structure
              print("📁 Folder structure:")
              for root, dirs, files in os.walk(output_path):
                  level = root.replace(output_path, '').count(os.sep)
                  indent = '  ' * level
                  folder_name = os.path.basename(root) or output_path
                  print(f"{indent}📁 {folder_name}/")
                  for f in files:
                      print(f"{indent}  📄 {f}")

              print("=" * 70)

              if total_files == 0:
                  print("❌ No files downloaded!")
                  print("Make sure the folder is shared as 'Anyone with the link'")
                  return 1

              return 0

          if __name__ == "__main__":
              sys.exit(main())
          EOF

      - name: Show downloaded files
        run: |
          echo "Downloaded files:"
          find ${{ github.event.inputs.output_path }} -type f 2>/dev/null | head -100 || echo "No files found"
          echo ""
          echo "Total files: $(find ${{ github.event.inputs.output_path }} -type f 2>/dev/null | wc -l)"
          echo "Total size: $(du -sh ${{ github.event.inputs.output_path }} 2>/dev/null | cut -f1 || echo '0')"

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: google-drive-downloads
          path: ${{ github.event.inputs.output_path }}
          retention-days: 7
          if-no-files-found: warn
