name: Download Google Drive Folder Recursively

on:
  workflow_dispatch:
    inputs:
      folder_url:
        description: 'Google Drive Folder URL'
        required: true
        type: string
      output_path:
        description: 'Output directory path'
        required: false
        default: 'downloads'
        type: string

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install gdown requests

      - name: Download all files recursively
        env:
          FOLDER_URL: ${{ github.event.inputs.folder_url }}
          OUTPUT_PATH: ${{ github.event.inputs.output_path }}
        run: |
          python3 << 'EOF'
          import os
          import re
          import requests
          import subprocess
          import json
          from urllib.parse import urlparse, parse_qs

          def extract_folder_id(url):
              """Extract folder ID from Google Drive URL"""
              # Handle different URL formats
              # Format 1: https://drive.google.com/drive/folders/FOLDER_ID
              # Format 2: https://drive.google.com/drive/u/0/folders/FOLDER_ID
              # Format 3: https://drive.google.com/open?id=FOLDER_ID

              if 'folders/' in url:
                  match = re.search(r'folders/([a-zA-Z0-9_-]+)', url)
                  if match:
                      return match.group(1)

              if 'id=' in url:
                  parsed = urlparse(url)
                  params = parse_qs(parsed.query)
                  if 'id' in params:
                      return params['id'][0]

              # If it's just an ID
              if re.match(r'^[a-zA-Z0-9_-]+$', url):
                  return url

              return None

          def get_folder_contents(folder_id):
              """Get all items (files and folders) in a Google Drive folder"""
              items = []

              # Use Google Drive's public folder listing endpoint
              url = f"https://drive.google.com/drive/folders/{folder_id}"

              try:
                  # Use gdown to list folder contents
                  result = subprocess.run(
                      ['gdown', '--folder', '--dry-run', f'https://drive.google.com/drive/folders/{folder_id}'],
                      capture_output=True,
                      text=True,
                      timeout=120
                  )

                  output = result.stdout + result.stderr
                  print(f"Scanning folder: {folder_id}")

                  # Parse the output to find files and folders
                  # gdown dry-run shows what would be downloaded

                  # Alternative: Use the Google Drive API via web scraping
                  # This gets the folder page and extracts items

              except Exception as e:
                  print(f"Error scanning folder {folder_id}: {e}")

              return items

          def download_folder_recursive(folder_id, output_dir, depth=0, max_depth=10):
              """
              Recursively download ALL contents from a Google Drive folder.
              This processes ALL folders at each level, not just the first one.
              """
              if depth > max_depth:
                  print(f"Max depth {max_depth} reached, stopping recursion")
                  return

              indent = "  " * depth
              print(f"{indent}Processing folder: {folder_id} (depth: {depth})")

              # Create output directory if it doesn't exist
              os.makedirs(output_dir, exist_ok=True)

              try:
                  # Use gdown with --folder flag to download entire folder
                  # The --remaining-ok flag continues even if some files fail
                  result = subprocess.run(
                      [
                          'gdown',
                          '--folder',
                          '--remaining-ok',
                          '-O', output_dir,
                          f'https://drive.google.com/drive/folders/{folder_id}'
                      ],
                      capture_output=True,
                      text=True,
                      timeout=3600  # 1 hour timeout
                  )

                  print(f"{indent}stdout: {result.stdout}")
                  if result.stderr:
                      print(f"{indent}stderr: {result.stderr}")

                  # Check if gdown downloaded successfully
                  if result.returncode == 0:
                      print(f"{indent}Successfully downloaded folder contents to {output_dir}")
                  else:
                      print(f"{indent}gdown returned code {result.returncode}, trying alternative method...")
                      download_folder_alternative(folder_id, output_dir, depth, max_depth)

              except subprocess.TimeoutExpired:
                  print(f"{indent}Timeout downloading folder {folder_id}")
              except Exception as e:
                  print(f"{indent}Error: {e}")
                  download_folder_alternative(folder_id, output_dir, depth, max_depth)

          def download_folder_alternative(folder_id, output_dir, depth=0, max_depth=10):
              """
              Alternative method using direct API calls to list and download files.
              This method manually traverses ALL subfolders.
              """
              if depth > max_depth:
                  return

              indent = "  " * depth
              os.makedirs(output_dir, exist_ok=True)

              try:
                  # Fetch folder page to extract file/folder list
                  # Using a different approach with the Google Drive embed/preview

                  headers = {
                      'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                  }

                  # Try to get folder listing via Google Drive API-like endpoint
                  list_url = f"https://drive.google.com/embeddedfolderview?id={folder_id}"

                  response = requests.get(list_url, headers=headers, timeout=30)

                  if response.status_code == 200:
                      content = response.text

                      # Extract file IDs and names from the response
                      # Pattern for files: data-id="FILE_ID"
                      file_pattern = r'\["([a-zA-Z0-9_-]{20,})"\s*,\s*"([^"]+)"\s*,\s*"([^"]*)"'

                      # Alternative pattern
                      id_pattern = r'data-id="([a-zA-Z0-9_-]+)"'
                      name_pattern = r'data-name="([^"]+)"'

                      file_ids = re.findall(id_pattern, content)
                      file_names = re.findall(name_pattern, content)

                      print(f"{indent}Found {len(file_ids)} items in folder")

                      # Process each item
                      for i, file_id in enumerate(file_ids):
                          name = file_names[i] if i < len(file_names) else f"item_{i}"

                          # Check if it's a folder or file by trying to access it as a folder
                          is_folder = check_if_folder(file_id)

                          if is_folder:
                              print(f"{indent}  📁 Found subfolder: {name}")
                              subfolder_path = os.path.join(output_dir, sanitize_filename(name))
                              # RECURSIVE CALL - process this subfolder
                              download_folder_alternative(file_id, subfolder_path, depth + 1, max_depth)
                          else:
                              print(f"{indent}  📄 Downloading file: {name}")
                              download_file(file_id, output_dir, name)
                  else:
                      print(f"{indent}Failed to access folder: HTTP {response.status_code}")

              except Exception as e:
                  print(f"{indent}Alternative method error: {e}")

          def check_if_folder(item_id):
              """Check if a Google Drive item is a folder"""
              try:
                  # Try to access it as a folder
                  url = f"https://drive.google.com/drive/folders/{item_id}"
                  response = requests.head(url, allow_redirects=True, timeout=10)
                  # If it redirects to a folder view, it's a folder
                  return 'folders' in response.url
              except:
                  return False

          def download_file(file_id, output_dir, filename=None):
              """Download a single file from Google Drive"""
              try:
                  safe_filename = sanitize_filename(filename) if filename else file_id
                  output_path = os.path.join(output_dir, safe_filename)

                  # Skip if already exists
                  if os.path.exists(output_path):
                      print(f"    File already exists: {safe_filename}")
                      return True

                  # Use gdown for reliable downloading
                  result = subprocess.run(
                      ['gdown', '--fuzzy', '-O', output_path, f'https://drive.google.com/uc?id={file_id}'],
                      capture_output=True,
                      text=True,
                      timeout=600  # 10 min timeout per file
                  )

                  if result.returncode == 0 and os.path.exists(output_path):
                      size = os.path.getsize(output_path)
                      print(f"    ✓ Downloaded: {safe_filename} ({size} bytes)")
                      return True
                  else:
                      print(f"    ✗ Failed to download: {safe_filename}")
                      return False

              except Exception as e:
                  print(f"    ✗ Error downloading {filename}: {e}")
                  return False

          def sanitize_filename(filename):
              """Remove invalid characters from filename"""
              # Replace invalid characters with underscore
              invalid_chars = '<>:"/\\|?*'
              for char in invalid_chars:
                  filename = filename.replace(char, '_')
              return filename.strip()

          def main():
              folder_url = os.environ.get('FOLDER_URL', '')
              output_path = os.environ.get('OUTPUT_PATH', 'downloads')

              if not folder_url:
                  print("Error: No folder URL provided")
                  return 1

              folder_id = extract_folder_id(folder_url)

              if not folder_id:
                  print(f"Error: Could not extract folder ID from URL: {folder_url}")
                  return 1

              print(f"=" * 60)
              print(f"Google Drive Recursive Folder Downloader")
              print(f"=" * 60)
              print(f"Folder ID: {folder_id}")
              print(f"Output Path: {output_path}")
              print(f"=" * 60)

              # Start recursive download
              download_folder_recursive(folder_id, output_path, depth=0, max_depth=10)

              # Print summary
              print(f"\n" + "=" * 60)
              print("Download Summary:")
              total_files = 0
              total_size = 0
              for root, dirs, files in os.walk(output_path):
                  for f in files:
                      filepath = os.path.join(root, f)
                      total_files += 1
                      total_size += os.path.getsize(filepath)

              print(f"Total files downloaded: {total_files}")
              print(f"Total size: {total_size / (1024*1024):.2f} MB")
              print(f"Output directory: {output_path}")
              print("=" * 60)

              return 0

          if __name__ == "__main__":
              exit(main())
          EOF

      - name: List downloaded files
        run: |
          echo "Downloaded files:"
          find ${{ github.event.inputs.output_path }} -type f | head -100
          echo ""
          echo "Directory structure:"
          find ${{ github.event.inputs.output_path }} -type d | head -50

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: google-drive-downloads
          path: ${{ github.event.inputs.output_path }}
          retention-days: 7
