name: Download Google Drive Folder Recursively

on:
  workflow_dispatch:
    inputs:
      folder_url:
        description: 'Google Drive Folder URL'
        required: true
        type: string
      output_path:
        description: 'Output directory path'
        required: false
        default: 'downloads'
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade gdown requests

      - name: Download all files recursively
        env:
          FOLDER_URL: ${{ github.event.inputs.folder_url }}
          OUTPUT_PATH: ${{ github.event.inputs.output_path }}
        run: |
          python3 << 'EOF'
          import os
          import re
          import sys
          import gdown
          import requests
          from pathlib import Path
          import time

          # Track statistics
          stats = {
              'downloaded': 0,
              'failed': 0,
              'skipped': 0,
              'failed_files': []
          }

          def extract_folder_id(url):
              """Extract folder ID from Google Drive URL"""
              if 'folders/' in url:
                  match = re.search(r'folders/([a-zA-Z0-9_-]+)', url)
                  if match:
                      return match.group(1)
              if 'id=' in url:
                  match = re.search(r'id=([a-zA-Z0-9_-]+)', url)
                  if match:
                      return match.group(1)
              if re.match(r'^[a-zA-Z0-9_-]+$', url):
                  return url
              return None

          def sanitize_filename(name):
              """Remove invalid characters from filename"""
              invalid_chars = '<>:"/\\|?*'
              for char in invalid_chars:
                  name = name.replace(char, '_')
              return name.strip()

          def get_folder_contents(folder_id):
              """
              Get ALL items in a Google Drive folder.
              Uses gdown's internal API.
              """
              try:
                  from gdown.download_folder import _get_folder_list
                  items = _get_folder_list(folder_id)
                  return items if items else []
              except Exception as e:
                  print(f"      Error listing folder: {e}")
                  return []

          def download_file_with_retry(file_id, output_path, filename, max_retries=3):
              """
              Download a single file with retry logic.
              Returns True if successful, False otherwise.
              """
              safe_name = sanitize_filename(filename)
              full_path = os.path.join(output_path, safe_name)

              # Skip if already exists
              if os.path.exists(full_path) and os.path.getsize(full_path) > 0:
                  print(f"      ⏭ Already exists: {safe_name}")
                  stats['skipped'] += 1
                  return True

              url = f"https://drive.google.com/uc?id={file_id}"

              for attempt in range(max_retries):
                  try:
                      if attempt > 0:
                          wait_time = 2 ** attempt  # Exponential backoff: 2, 4, 8 seconds
                          print(f"      ⏳ Retry {attempt + 1}/{max_retries} in {wait_time}s...")
                          time.sleep(wait_time)

                      result = gdown.download(url, output=full_path, quiet=True, fuzzy=True)

                      if result and os.path.exists(full_path) and os.path.getsize(full_path) > 0:
                          size_mb = os.path.getsize(full_path) / (1024 * 1024)
                          print(f"      ✓ Downloaded: {safe_name} ({size_mb:.2f} MB)")
                          stats['downloaded'] += 1
                          return True
                      else:
                          # Remove incomplete file
                          if os.path.exists(full_path):
                              os.remove(full_path)

                  except Exception as e:
                      error_msg = str(e)
                      if "Cannot retrieve the public link" in error_msg:
                          # Rate limited or permission issue - wait longer
                          if attempt < max_retries - 1:
                              wait_time = 5 * (attempt + 1)
                              print(f"      ⚠ Rate limited, waiting {wait_time}s...")
                              time.sleep(wait_time)
                      else:
                          print(f"      ⚠ Attempt {attempt + 1} error: {error_msg[:50]}")

              # All retries failed
              print(f"      ✗ Failed after {max_retries} attempts: {safe_name}")
              stats['failed'] += 1
              stats['failed_files'].append({'name': filename, 'id': file_id, 'path': output_path})
              return False

          def download_folder_recursive(folder_id, output_path, depth=0, max_depth=20):
              """
              Recursively download ALL contents from a Google Drive folder.
              Processes ALL folders and ALL files at each level.
              Continues even if some files fail.
              """
              if depth > max_depth:
                  print(f"{'  ' * depth}⚠ Max depth {max_depth} reached")
                  return

              indent = "  " * depth

              # Create directory
              Path(output_path).mkdir(parents=True, exist_ok=True)

              print(f"{indent}📁 Scanning: {folder_id[:15]}... (depth {depth})")

              # Get ALL items in this folder
              items = get_folder_contents(folder_id)

              if not items:
                  print(f"{indent}   ⚠ Could not list folder contents")
                  print(f"{indent}   Trying gdown.download_folder as fallback...")
                  try:
                      url = f"https://drive.google.com/drive/folders/{folder_id}"
                      gdown.download_folder(
                          url=url,
                          output=output_path,
                          quiet=False,
                          remaining_ok=True  # Continue even if some files fail
                      )
                  except Exception as e:
                      # Don't stop! Just log the error
                      print(f"{indent}   ⚠ Fallback error (continuing...): {str(e)[:60]}")
                  return

              # Count folders and files
              folders = [item for item in items if 'folder' in item.get('mimeType', '').lower()]
              files = [item for item in items if 'folder' not in item.get('mimeType', '').lower()]

              print(f"{indent}   Found: {len(folders)} folders, {len(files)} files")

              # Process ALL FILES first (download them)
              for i, item in enumerate(files):
                  item_id = item.get('id', '')
                  item_name = item.get('name', f'file_{i}')

                  print(f"{indent}   📄 [{i+1}/{len(files)}] {sanitize_filename(item_name)}")
                  download_file_with_retry(item_id, output_path, item_name)

                  # Small delay between files to avoid rate limiting
                  time.sleep(0.3)

              # Process ALL FOLDERS (recurse into each one)
              for i, item in enumerate(folders):
                  item_id = item.get('id', '')
                  item_name = item.get('name', f'folder_{i}')
                  safe_name = sanitize_filename(item_name)

                  print(f"{indent}   📁 [{i+1}/{len(folders)}] Entering: {safe_name}/")
                  subfolder_path = os.path.join(output_path, safe_name)

                  # RECURSIVE CALL - process this subfolder
                  download_folder_recursive(item_id, subfolder_path, depth + 1, max_depth)

                  # Delay between folders
                  time.sleep(0.5)

          def main():
              folder_url = os.environ.get('FOLDER_URL', '')
              output_path = os.environ.get('OUTPUT_PATH', 'downloads')

              if not folder_url:
                  print("Error: No folder URL provided")
                  return 1

              folder_id = extract_folder_id(folder_url)

              if not folder_id:
                  print(f"Error: Could not extract folder ID from: {folder_url}")
                  return 1

              print("=" * 70)
              print("Google Drive Recursive Folder Downloader")
              print("=" * 70)
              print(f"Folder URL: {folder_url}")
              print(f"Folder ID:  {folder_id}")
              print(f"Output:     {output_path}")
              print("=" * 70)
              print()

              # Start recursive download
              download_folder_recursive(folder_id, output_path)

              # Count actual files downloaded
              print()
              print("=" * 70)
              print("DOWNLOAD SUMMARY")
              print("=" * 70)

              total_files = 0
              total_size = 0
              for root, dirs, files in os.walk(output_path):
                  for f in files:
                      filepath = os.path.join(root, f)
                      total_files += 1
                      total_size += os.path.getsize(filepath)

              print(f"✓ Downloaded:  {stats['downloaded']} files")
              print(f"⏭ Skipped:     {stats['skipped']} files (already existed)")
              print(f"✗ Failed:      {stats['failed']} files")
              print(f"📦 Total size: {total_size / (1024*1024):.2f} MB")
              print()

              # Show failed files if any
              if stats['failed_files']:
                  print("❌ Failed files:")
                  for f in stats['failed_files'][:20]:  # Show first 20
                      print(f"   - {f['name']}")
                  if len(stats['failed_files']) > 20:
                      print(f"   ... and {len(stats['failed_files']) - 20} more")
                  print()

              # Show folder structure (abbreviated)
              print("📁 Folder structure (first 50 entries):")
              count = 0
              for root, dirs, files in os.walk(output_path):
                  if count > 50:
                      print("   ... (truncated)")
                      break
                  level = root.replace(output_path, '').count(os.sep)
                  indent = '  ' * level
                  folder_name = os.path.basename(root) or output_path
                  print(f"{indent}📁 {folder_name}/ ({len(files)} files)")
                  count += 1

              print("=" * 70)

              # Return success even if some files failed (partial success)
              if total_files > 0:
                  print(f"✅ Download completed! {total_files} files saved.")
                  return 0
              else:
                  print("❌ No files downloaded!")
                  return 1

          if __name__ == "__main__":
              sys.exit(main())
          EOF

      - name: Show downloaded files
        run: |
          echo "Downloaded files:"
          find ${{ github.event.inputs.output_path }} -type f 2>/dev/null | head -100 || echo "No files found"
          echo ""
          echo "Total files: $(find ${{ github.event.inputs.output_path }} -type f 2>/dev/null | wc -l)"
          echo "Total size: $(du -sh ${{ github.event.inputs.output_path }} 2>/dev/null | cut -f1 || echo '0')"

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: google-drive-downloads
          path: ${{ github.event.inputs.output_path }}
          retention-days: 7
          if-no-files-found: warn
