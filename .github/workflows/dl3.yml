name: 03-  Download Google Drive Folder

on:
  workflow_dispatch:
    inputs:
      drive_folder_url:
        description: 'Google Drive Folder URL (e.g., https://drive.google.com/drive/folders/FOLDER_ID)'
        required: true
        type: string
      folder_name:
        description: 'Custom folder name (optional - leave empty to auto-generate)'
        required: false
        type: string
        default: ''

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade gdown

      - name: Download Files Recursively
        id: download
        run: |
          python << 'EOF'
          import os
          import re
          import sys
          import gdown
          from pathlib import Path
          import json

          # Get the folder URL from input
          folder_url = "${{ github.event.inputs.drive_folder_url }}"
          custom_folder_name = "${{ github.event.inputs.folder_name }}".strip()

          # Extract folder ID from URL
          folder_id_match = re.search(r'folders/([a-zA-Z0-9_-]+)', folder_url)
          if not folder_id_match:
              folder_id_match = re.search(r'id=([a-zA-Z0-9_-]+)', folder_url)

          if not folder_id_match:
              print("Error: Could not extract folder ID from URL")
              sys.exit(1)

          folder_id = folder_id_match.group(1)
          print(f"Root Folder ID: {folder_id}")

          # Create base download directory
          if custom_folder_name:
              safe_name = re.sub(r'[<>:"/\\|?*&]', '_', custom_folder_name)
              base_dir = f"downloads/{safe_name}"
          else:
              base_dir = f"downloads/drive_folder_{folder_id[:8]}"

          Path(base_dir).mkdir(parents=True, exist_ok=True)
          print(f"Base directory: {base_dir}")
          print("=" * 60)

          url = f"https://drive.google.com/drive/folders/{folder_id}"

          print("Starting download with gdown...")
          print("This will recursively download all files and subfolders.")
          print("=" * 60)

          downloaded_count = 0
          failed_count = 0

          try:
              # Use gdown's folder download - it handles recursion internally
              # and maintains folder structure
              gdown.download_folder(
                  url=url,
                  output=base_dir,
                  quiet=False
              )

              # Count downloaded files
              for root, dirs, files in os.walk(base_dir):
                  downloaded_count += len(files)

              print(f"\n✅ gdown folder download completed!")

          except Exception as e:
              print(f"gdown.download_folder failed: {e}")
              print("\nTrying alternative method with Google Drive API...")

              # Alternative: Use gdown's internal folder listing
              try:
                  from gdown.download_folder import _get_folder_list

                  def download_folder_recursive(folder_id, output_path, depth=0):
                      """Recursively download folder contents"""
                      global downloaded_count, failed_count

                      indent = "  " * depth
                      print(f"{indent}📁 Scanning folder: {folder_id[:8]}...")

                      try:
                          # Get folder contents using gdown's internal function
                          folder_list = _get_folder_list(folder_id)

                          if not folder_list:
                              print(f"{indent}   No contents found")
                              return

                          for item in folder_list:
                              item_id = item.get('id')
                              item_name = item.get('name', 'unknown')
                              item_type = item.get('mimeType', '')

                              # Sanitize name
                              safe_item_name = re.sub(r'[<>:"/\\|?*]', '_', item_name)

                              if 'folder' in item_type:
                                  # It's a subfolder - recurse
                                  subfolder_path = os.path.join(output_path, safe_item_name)
                                  Path(subfolder_path).mkdir(parents=True, exist_ok=True)
                                  print(f"{indent}📁 Entering: {safe_item_name}/")
                                  download_folder_recursive(item_id, subfolder_path, depth + 1)
                              else:
                                  # It's a file - download it
                                  print(f"{indent}📄 Downloading: {safe_item_name}")
                                  try:
                                      file_url = f"https://drive.google.com/uc?id={item_id}&confirm=t"
                                      Path(output_path).mkdir(parents=True, exist_ok=True)
                                      output = gdown.download(
                                          file_url,
                                          output=os.path.join(output_path, safe_item_name),
                                          quiet=True,
                                          fuzzy=True
                                      )
                                      if output and os.path.exists(output):
                                          size_mb = os.path.getsize(output) / (1024 * 1024)
                                          print(f"{indent}   ✓ Done ({size_mb:.2f} MB)")
                                          downloaded_count += 1
                                      else:
                                          print(f"{indent}   ✗ Failed")
                                          failed_count += 1
                                  except Exception as file_err:
                                      print(f"{indent}   ✗ Error: {file_err}")
                                      failed_count += 1

                      except Exception as folder_err:
                          print(f"{indent}   Error listing folder: {folder_err}")

                  download_folder_recursive(folder_id, base_dir)

              except ImportError:
                  print("Alternative method not available")

                  # Last resort: try direct API call
                  print("\nTrying direct Google Drive API...")
                  import requests

                  def get_folder_contents_api(folder_id):
                      """Get folder contents using Google Drive's internal API"""
                      # This uses an undocumented but working endpoint
                      api_url = f"https://drive.google.com/drive/folders/{folder_id}"
                      headers = {
                          'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
                          'Accept': 'text/html,application/xhtml+xml'
                      }

                      response = requests.get(api_url, headers=headers)

                      # Look for data in script tags
                      # Google Drive embeds JSON data in the page
                      items = []

                      # Pattern to find file/folder data
                      # Look for patterns like: ["FILE_ID","FILE_NAME",...]
                      data_matches = re.findall(r'\["([a-zA-Z0-9_-]{20,})","([^"]+)"[^\]]*\]', response.text)

                      for match in data_matches:
                          item_id, item_name = match
                          if item_id != folder_id:  # Skip the current folder
                              items.append({'id': item_id, 'name': item_name})

                      # Remove duplicates
                      seen = set()
                      unique_items = []
                      for item in items:
                          if item['id'] not in seen:
                              seen.add(item['id'])
                              unique_items.append(item)

                      return unique_items

                  def download_recursive_api(folder_id, output_path, depth=0):
                      """Download using API method"""
                      global downloaded_count, failed_count

                      indent = "  " * depth
                      print(f"{indent}📁 Scanning: {folder_id[:8]}...")

                      items = get_folder_contents_api(folder_id)
                      print(f"{indent}   Found {len(items)} items")

                      for item in items:
                          item_id = item['id']
                          item_name = re.sub(r'[<>:"/\\|?*]', '_', item['name'])

                          # Try to determine if it's a folder by trying to list its contents
                          sub_items = get_folder_contents_api(item_id)

                          if sub_items:  # If it has contents, it's a folder
                              subfolder_path = os.path.join(output_path, item_name)
                              Path(subfolder_path).mkdir(parents=True, exist_ok=True)
                              print(f"{indent}📁 Folder: {item_name}/")
                              download_recursive_api(item_id, subfolder_path, depth + 1)
                          else:
                              # It's a file
                              print(f"{indent}📄 File: {item_name}")
                              try:
                                  file_url = f"https://drive.google.com/uc?id={item_id}&confirm=t"
                                  Path(output_path).mkdir(parents=True, exist_ok=True)
                                  output = gdown.download(
                                      file_url,
                                      output=os.path.join(output_path, item_name),
                                      quiet=True,
                                      fuzzy=True
                                  )
                                  if output and os.path.exists(output):
                                      size_mb = os.path.getsize(output) / (1024 * 1024)
                                      print(f"{indent}   ✓ Done ({size_mb:.2f} MB)")
                                      downloaded_count += 1
                                  else:
                                      print(f"{indent}   ✗ No output")
                                      failed_count += 1
                              except Exception as err:
                                  print(f"{indent}   ✗ Error: {err}")
                                  failed_count += 1

                  download_recursive_api(folder_id, base_dir)

          # Final summary
          print("")
          print("=" * 60)
          print("DOWNLOAD SUMMARY")
          print("=" * 60)

          # Recount files in case gdown method worked
          if downloaded_count == 0:
              for root, dirs, files in os.walk(base_dir):
                  downloaded_count += len(files)

          print(f"✓ Successfully downloaded: {downloaded_count} files")
          print(f"✗ Failed: {failed_count} files")

          # List folder structure
          print(f"\n📁 Folder structure in {base_dir}:")
          for root, dirs, files in os.walk(base_dir):
              level = root.replace(base_dir, '').count(os.sep)
              indent = '  ' * level
              folder_name = os.path.basename(root) or base_dir
              print(f"{indent}📁 {folder_name}/")
              sub_indent = '  ' * (level + 1)
              for file in files:
                  file_path = os.path.join(root, file)
                  size_mb = os.path.getsize(file_path) / (1024 * 1024)
                  print(f"{sub_indent}📄 {file} ({size_mb:.2f} MB)")

          # Write output for next steps
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"download_dir={base_dir}\n")
              f.write(f"downloaded_count={downloaded_count}\n")
              f.write(f"failed_count={failed_count}\n")

          # Only fail if NO files were downloaded
          if downloaded_count == 0:
              print("\n❌ ERROR: No files were downloaded!")
              print("Make sure the Google Drive folder is publicly shared (Anyone with the link).")
              sys.exit(1)
          else:
              print(f"\n✅ Download completed! {downloaded_count} files ready to commit.")

          EOF

      - name: Show folder structure
        run: |
          echo "📁 Downloaded folder structure:"
          if [ -d "downloads" ]; then
            find downloads -type f | head -100
            echo ""
            echo "Total files:"
            find downloads -type f | wc -l
            echo ""
            echo "Total size:"
            du -sh downloads/
          else
            echo "No downloads folder found"
          fi

      - name: Commit and push files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Configure git for large files
          git config --local http.postBuffer 524288000

          # Add all downloaded files
          git add downloads/

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No new files to commit"
          else
            git commit -m "📥 Downloaded ${{ steps.download.outputs.downloaded_count }} files from Google Drive (with subfolders)"
            git push
            echo "✅ Files committed and pushed successfully!"
          fi

      - name: Summary
        run: |
          echo "## 📥 Download Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Source:** ${{ github.event.inputs.drive_folder_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| ✓ Downloaded | ${{ steps.download.outputs.downloaded_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ✗ Failed | ${{ steps.download.outputs.failed_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Saved to:** \`${{ steps.download.outputs.download_dir }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Folder Structure:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          find downloads -type f | head -50 >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No files found"
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
