name: 03- Download Google Drive Folder

on:
  workflow_dispatch:
    inputs:
      drive_folder_url:
        description: 'Google Drive Folder URL (e.g., https://drive.google.com/drive/folders/FOLDER_ID)'
        required: true
        type: string
      folder_name:
        description: 'Custom folder name (optional - leave empty to auto-generate)'
        required: false
        type: string
        default: ''

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade gdown requests

      - name: Download Files Recursively
        id: download
        run: |
          python << 'EOF'
          import os
          import re
          import sys
          import gdown
          import requests
          from pathlib import Path
          from urllib.parse import unquote
          import time

          # Get the folder URL from input
          folder_url = "${{ github.event.inputs.drive_folder_url }}"
          custom_folder_name = "${{ github.event.inputs.folder_name }}".strip()

          # Extract folder ID from URL
          folder_id_match = re.search(r'folders/([a-zA-Z0-9_-]+)', folder_url)
          if not folder_id_match:
              folder_id_match = re.search(r'id=([a-zA-Z0-9_-]+)', folder_url)

          if not folder_id_match:
              print("Error: Could not extract folder ID from URL")
              sys.exit(1)

          folder_id = folder_id_match.group(1)
          print(f"Root Folder ID: {folder_id}")

          # Create base download directory
          if custom_folder_name:
              safe_name = re.sub(r'[<>:"/\\|?*&]', '_', custom_folder_name)
              base_dir = f"downloads/{safe_name}"
          else:
              base_dir = f"downloads/drive_folder_{folder_id[:8]}"

          Path(base_dir).mkdir(parents=True, exist_ok=True)
          print(f"Base directory: {base_dir}")
          print("=" * 60)

          # Session for requests
          session = requests.Session()
          session.headers.update({
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
          })

          downloaded_count = 0
          failed_count = 0
          failed_files = []
          processed_folders = set()

          def sanitize_name(name):
              """Remove invalid characters from file/folder names"""
              return re.sub(r'[<>:"/\\|?*]', '_', name)

          def get_folder_contents(folder_id):
              """Get files and subfolders from a Google Drive folder"""
              url = f"https://drive.google.com/drive/folders/{folder_id}"
              try:
                  response = session.get(url)
                  html = response.text

                  # Find file IDs and names
                  # Pattern for files: /file/d/FILE_ID
                  file_ids = re.findall(r'/file/d/([a-zA-Z0-9_-]+)', html)
                  file_ids = list(dict.fromkeys(file_ids))

                  # Pattern for subfolders: /folders/FOLDER_ID
                  subfolder_ids = re.findall(r'/folders/([a-zA-Z0-9_-]+)', html)
                  subfolder_ids = list(dict.fromkeys(subfolder_ids))
                  # Remove the current folder from subfolders
                  subfolder_ids = [f for f in subfolder_ids if f != folder_id]

                  return file_ids, subfolder_ids

              except Exception as e:
                  print(f"  Error scanning folder {folder_id}: {e}")
                  return [], []

          def get_folder_name(folder_id):
              """Try to get folder name from Google Drive"""
              try:
                  url = f"https://drive.google.com/drive/folders/{folder_id}"
                  response = session.get(url)
                  # Try to find folder name in the page title or content
                  title_match = re.search(r'<title>([^<]+)</title>', response.text)
                  if title_match:
                      title = title_match.group(1)
                      # Remove " - Google Drive" suffix
                      name = title.replace(' - Google Drive', '').strip()
                      if name and name != 'Google Drive':
                          return sanitize_name(name)
                  return f"folder_{folder_id[:8]}"
              except:
                  return f"folder_{folder_id[:8]}"

          def download_file(file_id, output_dir):
              """Download a single file"""
              global downloaded_count, failed_count, failed_files

              try:
                  file_url = f"https://drive.google.com/uc?id={file_id}&confirm=t"

                  # Ensure output directory exists
                  Path(output_dir).mkdir(parents=True, exist_ok=True)

                  output = gdown.download(
                      file_url,
                      output=f"{output_dir}/",
                      quiet=False,
                      fuzzy=True
                  )

                  if output and os.path.exists(output):
                      file_size = os.path.getsize(output)
                      size_mb = file_size / (1024 * 1024)
                      print(f"    ✓ Downloaded: {os.path.basename(output)} ({size_mb:.2f} MB)")
                      downloaded_count += 1
                      return True
                  else:
                      print(f"    ✗ Download returned no file")
                      failed_count += 1
                      failed_files.append(file_id)
                      return False

              except Exception as e:
                  print(f"    ✗ Failed: {e}")
                  failed_count += 1
                  failed_files.append(file_id)
                  return False

          def process_folder(folder_id, current_path, depth=0):
              """Recursively process a folder and its subfolders"""
              global processed_folders

              # Prevent infinite loops
              if folder_id in processed_folders:
                  return
              processed_folders.add(folder_id)

              indent = "  " * depth

              # Get folder name for display
              if depth > 0:
                  folder_name = get_folder_name(folder_id)
                  current_path = os.path.join(current_path, folder_name)
                  print(f"\n{indent}📁 Entering folder: {folder_name}")
              else:
                  print(f"\n{indent}📁 Processing root folder...")

              # Get contents
              file_ids, subfolder_ids = get_folder_contents(folder_id)

              print(f"{indent}   Found: {len(file_ids)} files, {len(subfolder_ids)} subfolders")

              # Download files in this folder
              if file_ids:
                  print(f"{indent}   Downloading files...")
                  for i, file_id in enumerate(file_ids, 1):
                      print(f"{indent}   [{i}/{len(file_ids)}] File ID: {file_id}")
                      download_file(file_id, current_path)
                      time.sleep(0.5)  # Small delay to avoid rate limiting

              # Process subfolders recursively
              if subfolder_ids:
                  print(f"{indent}   Processing {len(subfolder_ids)} subfolders...")
                  for subfolder_id in subfolder_ids:
                      process_folder(subfolder_id, current_path, depth + 1)

          # Start recursive processing
          print("Starting recursive folder scan...")
          print("This will download all files from all subfolders.")
          print("=" * 60)

          process_folder(folder_id, base_dir, depth=0)

          # Final summary
          print("")
          print("=" * 60)
          print("DOWNLOAD SUMMARY")
          print("=" * 60)
          print(f"✓ Successfully downloaded: {downloaded_count} files")
          print(f"✗ Failed: {failed_count} files")

          if failed_files:
              print(f"\nFailed file IDs:")
              for fid in failed_files[:10]:  # Show first 10
                  print(f"  - https://drive.google.com/file/d/{fid}")
              if len(failed_files) > 10:
                  print(f"  ... and {len(failed_files) - 10} more")

          # List folder structure
          print(f"\n📁 Folder structure in {base_dir}:")
          for root, dirs, files in os.walk(base_dir):
              level = root.replace(base_dir, '').count(os.sep)
              indent = '  ' * level
              folder_name = os.path.basename(root) or base_dir
              print(f"{indent}📁 {folder_name}/")
              sub_indent = '  ' * (level + 1)
              for file in files:
                  file_path = os.path.join(root, file)
                  size_mb = os.path.getsize(file_path) / (1024 * 1024)
                  print(f"{sub_indent}📄 {file} ({size_mb:.2f} MB)")

          # Write output for next steps
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"download_dir={base_dir}\n")
              f.write(f"downloaded_count={downloaded_count}\n")
              f.write(f"failed_count={failed_count}\n")

          # Only fail if NO files were downloaded
          if downloaded_count == 0:
              print("\n❌ ERROR: No files were downloaded!")
              print("Make sure the Google Drive folder is publicly shared.")
              sys.exit(1)
          else:
              print(f"\n✅ Download completed! {downloaded_count} files ready to commit.")

          EOF

      - name: Show folder structure
        run: |
          echo "📁 Downloaded folder structure:"
          if [ -d "downloads" ]; then
            find downloads -type f | head -100
            echo ""
            echo "Total files:"
            find downloads -type f | wc -l
            echo ""
            echo "Total size:"
            du -sh downloads/
          else
            echo "No downloads folder found"
          fi

      - name: Commit and push files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Configure git for large files
          git config --local http.postBuffer 524288000

          # Add all downloaded files
          git add downloads/

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No new files to commit"
          else
            git commit -m "📥 Downloaded ${{ steps.download.outputs.downloaded_count }} files from Google Drive (with subfolders)"
            git push
            echo "✅ Files committed and pushed successfully!"
          fi

      - name: Summary
        run: |
          echo "## 📥 Download Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Source:** ${{ github.event.inputs.drive_folder_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| ✓ Downloaded | ${{ steps.download.outputs.downloaded_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ✗ Failed | ${{ steps.download.outputs.failed_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Saved to:** \`${{ steps.download.outputs.download_dir }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Folder Structure:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          find downloads -type f | head -50 >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No files found"
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
