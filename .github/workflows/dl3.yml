name: 03 -Download Google Drive Folder

on:
  workflow_dispatch:
    inputs:
      drive_folder_url:
        description: 'Google Drive Folder URL (e.g., https://drive.google.com/drive/folders/FOLDER_ID)'
        required: true
        type: string
      folder_name:
        description: 'Custom folder name (optional - leave empty to auto-generate)'
        required: false
        type: string
        default: ''

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade gdown requests

      - name: Extract Folder ID and Download Files Recursively
        id: download
        run: |
          python << 'EOF'
          import os
          import re
          import sys
          import gdown
          from pathlib import Path

          # Get the folder URL from input
          folder_url = "${{ github.event.inputs.drive_folder_url }}"
          custom_folder_name = "${{ github.event.inputs.folder_name }}".strip()

          # Extract folder ID from URL
          folder_id_match = re.search(r'folders/([a-zA-Z0-9_-]+)', folder_url)
          if not folder_id_match:
              folder_id_match = re.search(r'id=([a-zA-Z0-9_-]+)', folder_url)

          if not folder_id_match:
              print("Error: Could not extract folder ID from URL")
              sys.exit(1)

          root_folder_id = folder_id_match.group(1)
          print(f"Root Folder ID: {root_folder_id}")

          # Create download directory with sanitized name
          if custom_folder_name:
              safe_name = re.sub(r'[<>:"/\\|?*$&]', '_', custom_folder_name)
              base_download_dir = f"downloads/{safe_name}"
          else:
              base_download_dir = f"downloads/drive_folder_{root_folder_id[:8]}"

          Path(base_download_dir).mkdir(parents=True, exist_ok=True)
          print(f"Base download directory: {base_download_dir}")

          def count_files(directory):
              """Count all files in directory recursively"""
              count = 0
              for f in Path(directory).rglob('*'):
                  if f.is_file():
                      count += 1
              return count

          def count_folders(directory):
              """Count all folders in directory recursively"""
              count = 0
              for f in Path(directory).rglob('*'):
                  if f.is_dir():
                      count += 1
              return count

          def download_with_gdown_folder(folder_id, output_dir):
              """Use gdown's built-in folder download - supports recursive download natively"""
              print(f"\nUsing gdown.download_folder() for recursive download...")
              print(f"This will automatically download all nested folders and files.\n")
              url = f"https://drive.google.com/drive/folders/{folder_id}"

              try:
                  gdown.download_folder(url=url, output=output_dir, quiet=False)
                  return True
              except Exception as e:
                  print(f"\ngdown.download_folder() error: {e}")
                  return False

          # Start download process
          print("=" * 60)
          print("STARTING RECURSIVE FOLDER DOWNLOAD")
          print("=" * 60)
          print(f"Root URL: https://drive.google.com/drive/folders/{root_folder_id}")
          print(f"Destination: {base_download_dir}")
          print("=" * 60)

          # Use gdown.download_folder - it handles recursive downloads natively!
          success = download_with_gdown_folder(root_folder_id, base_download_dir)

          # Count downloaded files AFTER gdown completes
          downloaded_count = count_files(base_download_dir)
          folders_count = count_folders(base_download_dir)

          print("")
          print("=" * 60)
          print("DOWNLOAD SUMMARY")
          print("=" * 60)
          print(f"📁 Folders created: {folders_count}")
          print(f"✓ Files downloaded: {downloaded_count}")

          # List folder structure
          print(f"\n📂 Folder structure in {base_download_dir}:")

          # Show directories first
          for f in sorted(Path(base_download_dir).rglob('*')):
              if f.is_dir():
                  rel_path = f.relative_to(base_download_dir)
                  print(f"  📁 {rel_path}/")

          # Show files with sizes
          print(f"\n📄 Files:")
          total_size = 0
          for f in sorted(Path(base_download_dir).rglob('*')):
              if f.is_file():
                  rel_path = f.relative_to(base_download_dir)
                  size_mb = f.stat().st_size / (1024 * 1024)
                  total_size += f.stat().st_size
                  print(f"  {rel_path} ({size_mb:.2f} MB)")

          print(f"\n📊 Total size: {total_size / (1024 * 1024):.2f} MB")

          # Write output for next steps
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"download_dir={base_download_dir}\n")
              f.write(f"downloaded_count={downloaded_count}\n")
              f.write(f"folders_processed={folders_count}\n")

          # Only fail if NO files were downloaded
          if downloaded_count == 0:
              print("\n❌ ERROR: No files were downloaded!")
              print("\nTroubleshooting:")
              print("1. Make sure the Google Drive folder is publicly shared")
              print("   (Right-click folder → Share → Anyone with the link)")
              print("2. The folder might be empty")
              print("3. Files might require special permissions")
              sys.exit(1)
          else:
              print(f"\n✅ Download completed! {downloaded_count} files in {folders_count} folders ready to commit.")

          EOF

      - name: List downloaded files
        run: |
          echo "📁 Downloaded files with folder structure:"
          if [ -d "downloads" ]; then
            echo ""
            echo "Folders:"
            find downloads -type d | sort
            echo ""
            echo "Files:"
            find downloads -type f -exec ls -lh {} \; | head -100
            echo ""
            echo "Total size:"
            du -sh downloads/
            echo ""
            echo "File count:"
            find downloads -type f | wc -l
          else
            echo "No downloads folder found"
          fi

      - name: Commit and push files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Configure git for large files
          git config --local http.postBuffer 524288000

          # Add all downloaded files
          git add downloads/

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No new files to commit"
          else
            git commit -m "📥 Downloaded ${{ steps.download.outputs.downloaded_count }} files from ${{ steps.download.outputs.folders_processed }} folders (Google Drive)"
            git push
            echo "✅ Files committed and pushed successfully!"
          fi

      - name: Summary
        run: |
          echo "## 📥 Recursive Download Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Source:** ${{ github.event.inputs.drive_folder_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📁 Folders | ${{ steps.download.outputs.folders_processed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ✓ Files Downloaded | ${{ steps.download.outputs.downloaded_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Saved to:** \`${{ steps.download.outputs.download_dir }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Folder Structure:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          find downloads -type d 2>/dev/null | head -30 >> $GITHUB_STEP_SUMMARY || echo "No folders found"
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Files (first 50):" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          find downloads -type f -exec ls -lh {} \; 2>/dev/null | head -50 >> $GITHUB_STEP_SUMMARY || echo "No files found"
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
