name: Download Google Drive Folder

on:
  workflow_dispatch:
    inputs:
      drive_folder_url:
        description: 'Google Drive Folder URL (e.g., https://drive.google.com/drive/folders/FOLDER_ID)'
        required: true
        type: string
      folder_name:
        description: 'Custom folder name (optional - leave empty to use Drive folder name)'
        required: false
        type: string
        default: ''

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade gdown

      - name: Extract Folder ID and Download Files
        id: download
        run: |
          python << 'EOF'
          import os
          import re
          import sys
          import gdown
          from pathlib import Path

          # Get the folder URL from input
          folder_url = "${{ github.event.inputs.drive_folder_url }}"
          custom_folder_name = "${{ github.event.inputs.folder_name }}".strip()

          # Extract folder ID from URL
          folder_id_match = re.search(r'folders/([a-zA-Z0-9_-]+)', folder_url)
          if not folder_id_match:
              # Try alternative format
              folder_id_match = re.search(r'id=([a-zA-Z0-9_-]+)', folder_url)

          if not folder_id_match:
              print("Error: Could not extract folder ID from URL")
              sys.exit(1)

          folder_id = folder_id_match.group(1)
          print(f"Folder ID: {folder_id}")

          # Create download directory with sanitized name
          if custom_folder_name:
              # Sanitize folder name - remove special characters
              safe_name = re.sub(r'[<>:"/\\|?*&]', '_', custom_folder_name)
              download_dir = f"downloads/{safe_name}"
          else:
              download_dir = f"downloads/drive_folder_{folder_id[:8]}"

          Path(download_dir).mkdir(parents=True, exist_ok=True)
          print(f"Download directory: {download_dir}")

          # Download entire folder using gdown
          # gdown handles virus scan confirmation automatically
          url = f"https://drive.google.com/drive/folders/{folder_id}"

          print(f"Starting download from: {url}")
          print("This may take a while for large files with virus scan...")

          file_count = 0

          try:
              # Download folder with all files
              # Using only supported parameters
              gdown.download_folder(
                  url=url,
                  output=download_dir,
                  quiet=False
              )
              print("Download completed!")

              # List downloaded files
              downloaded_files = list(Path(download_dir).rglob('*'))
              file_count = len([f for f in downloaded_files if f.is_file()])
              print(f"Total files downloaded: {file_count}")

              for f in downloaded_files:
                  if f.is_file():
                      size = f.stat().st_size
                      print(f"  - {f.relative_to(download_dir)} ({size} bytes)")

          except Exception as e:
              print(f"Error during folder download: {e}")
              print("")
              print("Trying to download files individually...")

              # Alternative: Get file list and download each file separately
              try:
                  import requests
                  from bs4 import BeautifulSoup

                  # Try to get folder contents
                  session = requests.Session()
                  response = session.get(f"https://drive.google.com/drive/folders/{folder_id}")

                  # Look for file IDs in the page
                  file_ids = re.findall(r'/file/d/([a-zA-Z0-9_-]+)', response.text)
                  file_ids = list(set(file_ids))  # Remove duplicates

                  if file_ids:
                      print(f"Found {len(file_ids)} files in folder")

                      for i, file_id in enumerate(file_ids, 1):
                          print(f"Downloading file {i}/{len(file_ids)}: {file_id}")
                          try:
                              file_url = f"https://drive.google.com/uc?id={file_id}"
                              output_path = f"{download_dir}/"
                              gdown.download(file_url, output_path, quiet=False, fuzzy=True)
                              file_count += 1
                          except Exception as file_error:
                              print(f"  Failed to download file {file_id}: {file_error}")
                              continue

                      print(f"Downloaded {file_count} files")
                  else:
                      print("Could not find any files in the folder")
                      print("Make sure the folder is publicly shared!")
                      sys.exit(1)

              except Exception as e2:
                  print(f"Alternative method also failed: {e2}")
                  sys.exit(1)

          # Write output for next steps
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"download_dir={download_dir}\n")
              f.write(f"file_count={file_count}\n")

          if file_count == 0:
              print("WARNING: No files were downloaded!")
              print("Make sure the Google Drive folder is publicly shared (Anyone with the link can view)")

          EOF

      - name: List downloaded files
        run: |
          echo "📁 Downloaded files:"
          if [ -d "downloads" ]; then
            find downloads -type f -exec ls -lh {} \;
          else
            echo "No downloads folder found"
          fi

      - name: Commit and push files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Add all downloaded files
          git add downloads/

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No new files to commit"
          else
            git commit -m "📥 Downloaded files from Google Drive folder"
            git push
            echo "✅ Files committed and pushed successfully!"
          fi

      - name: Summary
        run: |
          echo "## 📥 Download Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Source:** ${{ github.event.inputs.drive_folder_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Downloaded to:** \`${{ steps.download.outputs.download_dir }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Files:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          find downloads -type f -exec ls -lh {} \; >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No files found"
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
