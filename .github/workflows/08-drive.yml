name: 08 - Download Google Drive Files

on:
  workflow_dispatch:
    inputs:
      drive_folder_url:
        description: 'Google Drive folder URL (public shared link)'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install gdown
        run: pip install gdown

      - name: Extract folder ID from URL
        id: extract_id
        run: |
          URL="${{ github.event.inputs.drive_folder_url }}"
          if [[ "$URL" =~ folders/([a-zA-Z0-9_-]+) ]]; then
            FOLDER_ID="${BASH_REMATCH[1]}"
          elif [[ "$URL" =~ id=([a-zA-Z0-9_-]+) ]]; then
            FOLDER_ID="${BASH_REMATCH[1]}"
          else
            FOLDER_ID="$URL"
          fi
          echo "folder_id=$FOLDER_ID" >> $GITHUB_OUTPUT
          echo "Extracted folder ID: $FOLDER_ID"

      - name: Create downloads directory
        run: mkdir -p downloads

      - name: Download files from Google Drive and save links to list.txt
        env:
          FOLDER_ID: ${{ steps.extract_id.outputs.folder_id }}
        run: |
          echo "=============================================="
          echo "Downloading from Google Drive folder: $FOLDER_ID"
          echo "=============================================="

          FOLDER_URL="https://drive.google.com/drive/folders/$FOLDER_ID"

          # Initialize list.txt
          echo "# Google Drive Download Links" > list.txt
          echo "# Generated from folder: $FOLDER_URL" >> list.txt
          echo "# Format: FILE_ID | FILENAME | DOWNLOAD_LINK" >> list.txt
          echo "# ============================================" >> list.txt
          echo "" >> list.txt

          cd downloads

          # Run gdown and capture output in real-time
          # Parse "Processing file" lines and save to list.txt
          gdown --folder "$FOLDER_URL" 2>&1 | while IFS= read -r line; do
            echo "$line"

            if [[ "$line" =~ Processing\ file\ ([a-zA-Z0-9_-]+)\ (.+)$ ]]; then
              FILE_ID="${BASH_REMATCH[1]}"
              FILE_NAME="${BASH_REMATCH[2]}"
              DOWNLOAD_LINK="https://drive.google.com/uc?id=${FILE_ID}&export=download"

              echo "${FILE_ID} | ${FILE_NAME} | ${DOWNLOAD_LINK}" >> ../list.txt
            fi
          done

          cd ..

          # Add total count
          FILE_COUNT=$(grep -c "drive.google.com" list.txt || echo "0")
          echo "" >> list.txt
          echo "# Total files: $FILE_COUNT" >> list.txt

          echo ""
          echo "=============================================="
          echo "Download completed! Found $FILE_COUNT files"
          echo "=============================================="
          echo ""
          echo "=== list.txt content ==="
          cat list.txt

      - name: Generate README.md for each folder
        run: |
          find downloads -mindepth 1 -type d | while read -r folder; do
            folder_name=$(basename "$folder")
            readme_path="$folder/README.md"

            echo "Creating README.md for: $folder_name"

            echo "# $folder_name" > "$readme_path"
            echo "" >> "$readme_path"
            echo "## Files" >> "$readme_path"
            echo "" >> "$readme_path"
            echo "| File | Download |" >> "$readme_path"
            echo "|------|----------|" >> "$readme_path"

            find "$folder" -maxdepth 1 -type f ! -name "README.md" | sort -V | while read -r file; do
              filename=$(basename "$file")
              echo "| $filename | [Download]($filename) |" >> "$readme_path"
            done

            echo "" >> "$readme_path"
            echo "---" >> "$readme_path"
            echo "_Auto-generated by GitHub Actions_" >> "$readme_path"
          done

          echo "README.md files created for all folders"

      - name: Display download summary
        run: |
          echo "=== Download Summary ==="
          echo "Total size:"
          du -sh downloads/ 2>/dev/null || echo "No files downloaded yet"
          echo ""
          echo "Folder structure:"
          find downloads -type d 2>/dev/null || echo "No folders yet"
          echo ""
          echo "Total files downloaded:"
          find downloads -type f 2>/dev/null | wc -l
          echo ""
          echo "If not all files were downloaded (rate limited),"
          echo "run this workflow again to continue downloading."

      - name: Commit and push files to repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add --force downloads/ list.txt

          if git diff --staged --quiet; then
            echo "No new files to commit"
          else
            FILE_COUNT=$(find downloads -type f ! -name "README.md" | wc -l)
            FOLDER_COUNT=$(find downloads -mindepth 1 -type d | wc -l)

            git commit -m "📥 Downloaded $FILE_COUNT files in $FOLDER_COUNT folders from Google Drive"
            git push

            echo ""
            echo "=============================================="
            echo "Successfully committed $FILE_COUNT files!"
            echo "list.txt saved with all download links"
            echo "=============================================="
          fi
