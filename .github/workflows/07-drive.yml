                              continue
                          if item_name.startswith('[') or item_name.startswith('{'):
                              continue

                          seen.add(item_id)

                          if item_id in folder_ids:
                              folders.append({'id': item_id, 'name': item_name})
                          elif '.' in item_name.split('/')[-1]:
                              files.append({'id': item_id, 'name': item_name})
                          else:
                              # No extension - could be folder or file, check context
                              if item_id in folder_ids:
                                  folders.append({'id': item_id, 'name': item_name})
                              else:
