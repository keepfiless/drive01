name: 06 - Download Google Drive Files

on:
  workflow_dispatch:
    inputs:
      drive_folder_url:
        description: 'Google Drive folder URL (public shared link)'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install gdown
        run: pip install gdown

      - name: Extract folder ID from URL
        id: extract_id
        run: |
          URL="${{ github.event.inputs.drive_folder_url }}"
          if [[ "$URL" =~ folders/([a-zA-Z0-9_-]+) ]]; then
            FOLDER_ID="${BASH_REMATCH[1]}"
          elif [[ "$URL" =~ id=([a-zA-Z0-9_-]+) ]]; then
            FOLDER_ID="${BASH_REMATCH[1]}"
          else
            FOLDER_ID="$URL"
          fi
          echo "folder_id=$FOLDER_ID" >> $GITHUB_OUTPUT
          echo "Extracted folder ID: $FOLDER_ID"

      - name: Create downloads directory
        run: mkdir -p downloads

      - name: Download files from Google Drive
        env:
          FOLDER_ID: ${{ steps.extract_id.outputs.folder_id }}
        run: |
          echo "==============================================="
          echo "Downloading from Google Drive folder: $FOLDER_ID"
          echo "==============================================="
          echo ""

          cd downloads

          MAX_RETRIES=15
          SUCCESS=false
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Download attempt #$i/$MAX_RETRIES..."

            set +e # Do not exit on error
            gdown --folder "https://drive.google.com/drive/folders/$FOLDER_ID"
            EXIT_CODE=$?
            set -e # Re-enable exit on error

            if [ $EXIT_CODE -eq 0 ]; then
              echo "gdown reports success. All files downloaded."
              SUCCESS=true
              break
            else
              echo "gdown exited with code $EXIT_CODE. This likely means some files failed to download due to rate limiting."
              if [ $i -lt $MAX_RETRIES ]; then
                  WAIT_TIME=$((60 * i)) # Increase wait time on each retry
                  echo "Will retry in $WAIT_TIME seconds..."
                  sleep $WAIT_TIME
              else
                  echo "Max retries reached. Download may be incomplete."
              fi
            fi
          done

          cd ..
          echo ""

          if [ "$SUCCESS" = "true" ]; then
            echo "Download completed successfully!"
          else
            echo "Download may be incomplete after $MAX_RETRIES attempts."
            echo "This may be due to persistent Google Drive rate limiting."
            echo "You can try running the workflow again to download any remaining files."
          fi

      - name: Generate README.md for each folder
        run: |
          find downloads -mindepth 1 -type d | while read -r folder; do
            folder_name=$(basename "$folder")
            readme_path="$folder/README.md"

            echo "Creating README.md for: $folder_name"

            echo "# $folder_name" > "$readme_path"
            echo "" >> "$readme_path"
            echo "## Files" >> "$readme_path"
            echo "" >> "$readme_path"
            echo "| File | Download |" >> "$readme_path"
            echo "|------|----------|" >> "$readme_path"

            find "$folder" -maxdepth 1 -type f ! -name "README.md" | sort | while read -r file; do
              filename=$(basename "$file")
              echo "| $filename | [Download]($filename) |" >> "$readme_path"
            done

            echo "" >> "$readme_path"
            echo "---" >> "$readme_path"
            echo "_Auto-generated by GitHub Actions_" >> "$readme_path"
          done

          echo "README.md files created for all folders"

      - name: Display download summary
        run: |
          echo "=== Download Summary ==="
          echo "Total size:"
          du -sh downloads/ 2>/dev/null || echo "No files downloaded yet"
          echo ""
          echo "Folder structure:"
          find downloads -type d 2>/dev/null || echo "No folders yet"
          echo ""
          echo "Total files downloaded:"
          find downloads -type f 2>/dev/null | wc -l
          echo ""
          echo "If not all files were downloaded (rate limited),"
          echo "run this workflow again to continue downloading."

      - name: Commit and push files to repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add --force downloads/

          if git diff --staged --quiet; then
            echo "No new files to commit"
          else
            FILE_COUNT=$(find downloads -type f ! -name "README.md" | wc -l)
            FOLDER_COUNT=$(find downloads -mindepth 1 -type d | wc -l)

            git commit -m "📥 Downloaded $FILE_COUNT files in $FOLDER_COUNT folders from Google Drive"
            git push

            echo ""
            echo "=============================================="
            echo "Successfully committed $FILE_COUNT files!"
            echo "=============================================="
          fi
