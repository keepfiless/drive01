                      return files, folders

                  except Exception as e:
                      print(f"  Attempt {attempt+1} failed: {e}")
                      time.sleep(3)

              return [], []

          def list_folder_recursive(folder_id, path_prefix="", session=None, depth=0):
              """List all files recursively."""
              if session is None:
                  session = requests.Session()
                  session.headers.update({
                      'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
                  })

              all_files = []
              indent = "  " * depth

              print(f"{indent}Listing: {folder_id} (path: {path_prefix or '/'})")

              files, folders = get_folder_contents(folder_id, session)

              print(f"{indent}  Found {len(files)} files, {len(folders)} folders")

              for f in files:
                  file_path = os.path.join(path_prefix, f['name']) if path_prefix else f['name']
                  print(f"{indent}  [FILE] {f['name']}")
                  all_files.append({
                      'id': f['id'],
                      'name': f['name'],
                      'path': file_path
                  })

              for folder in folders:
                  subfolder_path = os.path.join(path_prefix, folder['name']) if path_prefix else folder['name']
                  print(f"{indent}  [FOLDER] {folder['name']}")
                  time.sleep(1)  # Rate limiting
                  subfolder_files = list_folder_recursive(folder['id'], subfolder_path, session, depth + 1)
                  all_files.extend(subfolder_files)

              return all_files

          def main():
              folder_id = os.environ.get('FOLDER_ID')

              print("=" * 60)
              print(f"Listing folder: {folder_id}")
              print("=" * 60)

              all_files = list_folder_recursive(folder_id)

              # Remove duplicates
              seen = set()
              unique_files = []
              for f in all_files:
                  if f['id'] not in seen:
                      seen.add(f['id'])
                      unique_files.append(f)
              all_files = unique_files

              os.makedirs('file_list', exist_ok=True)

              with open('file_list/all_files.json', 'w') as f:
                  json.dump(all_files, f, indent=2)

              with open('file_list/summary.json', 'w') as f:
                  json.dump({'total_files': len(all_files), 'folder_id': folder_id}, f, indent=2)

              print(f"\nTotal files: {len(all_files)}")

              if all_files:
                  print("\nFirst 20 files:")
                  for f in all_files[:20]:
                      print(f"  - {f['path']}")

              with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as f:
                  f.write(f"total_files={len(all_files)}\n")

          if __name__ == "__main__":
              main()
          PYTHON_SCRIPT

          python list_files.py

      - name: Upload file list
        uses: actions/upload-artifact@v4
        with:
          name: file-list
          path: file_list/
          retention-days: 1

      - name: Display summary
        run: |
          echo "=== File Listing Summary ==="
          cat file_list/summary.json
          echo ""
          echo "First 20 files:"
          python -c "import json; files=json.load(open('file_list/all_files.json')); [print(f['path']) for f in files[:20]]" 2>/dev/null || echo "No files"

  download_files:
    needs: list_files
    if: needs.list_files.outputs.total_files != '0'
    runs-on: ubuntu-latest
