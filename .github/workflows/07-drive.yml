name: 07 - Download Google Drive Files

on:
  workflow_dispatch:
    inputs:
      drive_folder_url:
        description: 'Google Drive folder URL (public shared link)'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gdown requests

      - name: Extract folder ID from URL
        id: extract_id
        run: |
          URL="${{ github.event.inputs.drive_folder_url }}"
          if [[ "$URL" =~ folders/([a-zA-Z0-9_-]+) ]]; then
            FOLDER_ID="${BASH_REMATCH[1]}"
          elif [[ "$URL" =~ id=([a-zA-Z0-9_-]+) ]]; then
            FOLDER_ID="${BASH_REMATCH[1]}"
          else
            FOLDER_ID="$URL"
          fi
          echo "folder_id=$FOLDER_ID" >> $GITHUB_OUTPUT
          echo "Extracted folder ID: $FOLDER_ID"

      - name: Create downloads directory
        run: mkdir -p downloads

      - name: Download files with skip existing
        env:
          FOLDER_ID: ${{ steps.extract_id.outputs.folder_id }}
        run: |
          cat << 'PYTHON_SCRIPT' > download_script.py
          import os
          import sys
          import re
          import json
          import requests
          from pathlib import Path
          import gdown

          def get_existing_files(download_dir):
              """Get set of all existing file paths in download directory."""
              existing = set()
              download_path = Path(download_dir)
              if download_path.exists():
                  for file_path in download_path.rglob('*'):
                      if file_path.is_file() and file_path.name != 'README.md':
                          rel_path = file_path.relative_to(download_path)
                          existing.add(str(rel_path))
              return existing

          def get_folder_contents(folder_id, session):
              """Get list of files and folders from a Google Drive folder."""
              url = f"https://drive.google.com/drive/folders/{folder_id}"

              try:
                  headers = {
                      'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                  }
                  res = session.get(url, headers=headers)

                  if res.status_code != 200:
                      print(f"Failed to access folder: {folder_id} (status: {res.status_code})")
                      return []

                  contents = []

                  # Pattern to find files/folders in the page
                  # Looking for patterns like: ["FILE_ID","FILE_NAME",...]
                  # The data is in a specific format in the page

                  # Try to find the data array in the page
                  text = res.text

                  # Find all potential file/folder entries
                  # Pattern: data-id="ID" followed by name info
                  id_pattern = r'data-id="([a-zA-Z0-9_-]{20,})"'
                  ids = re.findall(id_pattern, text)

                  # Also look for the JSON-like structures
                  # Pattern for file entries in Google Drive HTML
                  json_pattern = r'\["([a-zA-Z0-9_-]{25,})","([^"]+)",[^,]*,[^,]*,"([^"]*)"'
                  matches = re.findall(json_pattern, text)

                  seen_ids = set()

                  for match in matches:
                      file_id, name, mime_type = match[0], match[1], match[2] if len(match) > 2 else ""

                      if file_id in seen_ids:
                          continue
                      seen_ids.add(file_id)

                      # Skip if it's the folder itself
                      if file_id == folder_id:
                          continue

                      is_folder = 'folder' in mime_type.lower() if mime_type else False

                      contents.append({
                          'id': file_id,
                          'name': name,
                          'is_folder': is_folder
                      })

                  # If no matches found with first pattern, try alternative
                  if not contents:
                      # Alternative: look for specific patterns
                      alt_pattern = r'\["(1[a-zA-Z0-9_-]{30,})","([^"]+)","https://drive\.google\.com/[^"]*"'
                      alt_matches = re.findall(alt_pattern, text)

                      for match in alt_matches:
                          file_id, name = match[0], match[1]
                          if file_id not in seen_ids:
                              seen_ids.add(file_id)
                              contents.append({
                                  'id': file_id,
                                  'name': name,
                                  'is_folder': False  # Assume file
                              })

                  return contents

              except Exception as e:
                  print(f"Error getting folder contents: {e}")
                  return []

          def download_recursive(folder_id, local_dir, existing_set, session, stats):
              """Recursively download folder, skipping existing files."""

              contents = get_folder_contents(folder_id, session)

              if not contents:
                  print(f"  No contents found or cannot access folder")
                  return

              for item in contents:
                  item_id = item['id']
                  item_name = item['name']
                  is_folder = item['is_folder']

                  # Clean filename
                  safe_name = "".join(c for c in item_name if c not in '<>:"/\\|?*')
                  local_path = os.path.join(local_dir, safe_name)
                  rel_path = os.path.relpath(local_path, 'downloads')

                  if is_folder:
                      print(f"  [FOLDER] {safe_name}")
                      os.makedirs(local_path, exist_ok=True)
                      download_recursive(item_id, local_path, existing_set, session, stats)
                  else:
                      # Check if file exists
                      if rel_path in existing_set:
                          print(f"  [SKIP] {rel_path}")
                          stats['skipped'] += 1
                      elif os.path.exists(local_path):
                          print(f"  [SKIP] {rel_path} (exists on disk)")
                          stats['skipped'] += 1
                      else:
                          print(f"  [DOWNLOAD] {rel_path}")
                          os.makedirs(os.path.dirname(local_path), exist_ok=True)
                          try:
                              gdown.download(
                                  id=item_id,
                                  output=local_path,
                                  quiet=False,
                                  fuzzy=True
                              )
                              if os.path.exists(local_path):
                                  stats['downloaded'] += 1
                              else:
                                  print(f"  [FAILED] {rel_path} - file not created")
                                  stats['failed'] += 1
                          except Exception as e:
                              error_msg = str(e)
                              print(f"  [FAILED] {rel_path}")
                              print(f"           Error: {error_msg}")
                              stats['failed'] += 1

                              # Check if rate limited
                              if 'quota' in error_msg.lower() or 'too many' in error_msg.lower() or 'Cannot retrieve' in error_msg:
                                  print("")
                                  print("=" * 50)
                                  print("RATE LIMITED - Stopping download")
                                  print("Run workflow again to continue")
                                  print("=" * 50)
                                  stats['rate_limited'] = True
                                  return

          def main():
              folder_id = os.environ.get('FOLDER_ID')
              download_dir = 'downloads'

              print("=" * 60)
              print("GOOGLE DRIVE DOWNLOADER - RESUME MODE")
              print("=" * 60)
              print()

              # Count existing files BEFORE download
              existing_before = get_existing_files(download_dir)
              count_before = len(existing_before)
              print(f"Existing files in repo: {count_before}")

              if count_before > 0:
                  print("Sample of existing files:")
                  for f in sorted(existing_before)[:10]:
                      print(f"  > {f}")
                  if count_before > 10:
                      print(f"  ... and {count_before - 10} more")
              print()

              print(f"Folder ID: {folder_id}")
              print("Files that already exist will be SKIPPED.")
              print()

              # Create session
              session = requests.Session()

              # Stats tracking
              stats = {
                  'downloaded': 0,
                  'skipped': 0,
                  'failed': 0,
                  'rate_limited': False
              }

              # Start download
              print("Scanning folder structure...")
              os.makedirs(download_dir, exist_ok=True)
              download_recursive(folder_id, download_dir, existing_before, session, stats)

              # Count files AFTER download
              existing_after = get_existing_files(download_dir)
              count_after = len(existing_after)

              print()
              print("=" * 60)
              print("DOWNLOAD SUMMARY")
              print("=" * 60)
              print(f"Files before run:  {count_before}")
              print(f"Files after run:   {count_after}")
              print(f"New files:         {count_after - count_before}")
              print()
              print(f"Downloaded: {stats['downloaded']}")
              print(f"Skipped:    {stats['skipped']}")
              print(f"Failed:     {stats['failed']}")
              print()

              if stats['rate_limited']:
                  print("Download was RATE LIMITED.")
                  print("Run this workflow again to continue.")
              elif stats['downloaded'] == 0 and stats['failed'] == 0:
                  print("No new files to download.")
                  if count_after > 0:
                      print(f"All {count_after} files are already in the repository!")
                      print("100% COMPLETE")
              else:
                  print("Run workflow again if more files remain.")

              print("=" * 60)

          if __name__ == "__main__":
              main()
          PYTHON_SCRIPT

          python download_script.py

      - name: Show file count
        run: |
          echo ""
          echo "=== REPOSITORY STATUS ==="
          FILE_COUNT=$(find downloads -type f ! -name "README.md" 2>/dev/null | wc -l)
          echo "Total files in downloads folder: $FILE_COUNT"
          echo ""

      - name: Generate README.md for each folder
        run: |
          find downloads -mindepth 1 -type d | while read -r folder; do
            folder_name=$(basename "$folder")
            readme_path="$folder/README.md"

            echo "# $folder_name" > "$readme_path"
            echo "" >> "$readme_path"
            echo "## Files" >> "$readme_path"
            echo "" >> "$readme_path"
            echo "| File | Download |" >> "$readme_path"
            echo "|------|----------|" >> "$readme_path"

            find "$folder" -maxdepth 1 -type f ! -name "README.md" | sort | while read -r file; do
              filename=$(basename "$file")
              echo "| $filename | [Download]($filename) |" >> "$readme_path"
            done

            echo "" >> "$readme_path"
            echo "---" >> "$readme_path"
            echo "_Auto-generated by GitHub Actions_" >> "$readme_path"
          done

      - name: Commit and push files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add --force downloads/

          if git diff --staged --quiet; then
            echo ""
            echo "=============================================="
            echo "NO NEW FILES TO COMMIT"
            echo "=============================================="
            echo "All files are already in the repository."
            FILE_COUNT=$(find downloads -type f ! -name "README.md" 2>/dev/null | wc -l)
            echo "Total files: $FILE_COUNT"
            echo ""
            echo "If this matches your Google Drive folder count,"
            echo "then 100% of files are downloaded!"
          else
            FILE_COUNT=$(find downloads -type f ! -name "README.md" | wc -l)
            FOLDER_COUNT=$(find downloads -mindepth 1 -type d | wc -l)

            git commit -m "Update: $FILE_COUNT files in $FOLDER_COUNT folders"
            git push

            echo ""
            echo "=============================================="
            echo "SAVED $FILE_COUNT FILES TO REPOSITORY"
            echo "=============================================="
            echo ""
            echo "If more files remain, run workflow again."
          fi

      - name: Cleanup
        run: rm -f download_script.py
