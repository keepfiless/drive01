name: 07 - Download Google Drive Files

on:
  workflow_dispatch:
    inputs:
      drive_folder_url:
        description: 'Google Drive folder URL (public shared link)'
        required: true
        type: string
      batch_size:
        description: 'Number of files to download per batch (default: 25)'
        required: false
        default: '25'
        type: string
      delay_between_files:
        description: 'Delay in seconds between individual files (default: 2)'
        required: false
        default: '2'
        type: string

jobs:
  list_files:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      folder_id: ${{ steps.extract_id.outputs.folder_id }}
      total_files: ${{ steps.list.outputs.total_files }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install gdown
        run: pip install gdown

      - name: Extract folder ID from URL
        id: extract_id
        run: |
          URL="${{ github.event.inputs.drive_folder_url }}"
          if [[ "$URL" =~ folders/([a-zA-Z0-9_-]+) ]]; then
            FOLDER_ID="${BASH_REMATCH[1]}"
          elif [[ "$URL" =~ id=([a-zA-Z0-9_-]+) ]]; then
            FOLDER_ID="${BASH_REMATCH[1]}"
          else
            FOLDER_ID="$URL"
          fi
          echo "folder_id=$FOLDER_ID" >> $GITHUB_OUTPUT
          echo "Extracted folder ID: $FOLDER_ID"

      - name: List all files using gdown
        id: list
        env:
          FOLDER_ID: ${{ steps.extract_id.outputs.folder_id }}
        run: |
          cat << 'PYTHON_SCRIPT' > list_files.py
          import os
          import json
          import re
          import requests
          import time

          def get_folder_contents(folder_id, session):
              """Get folder contents by parsing Google Drive page."""
              url = f"https://drive.google.com/drive/folders/{folder_id}"

              for attempt in range(3):
                  try:
                      resp = session.get(url, timeout=30)
                      if resp.status_code != 200:
                          print(f"  Got status {resp.status_code}, retrying...")
                          time.sleep(3)
                          continue

                      content = resp.text
                      files = []
                      folders = []

                      # Pattern to find items: ["ID",["parent"],"name"
                      pattern = r'\["([a-zA-Z0-9_-]{20,50})"\s*,\s*\["[a-zA-Z0-9_-]+"\]\s*,\s*"([^"]{1,500})"'
                      matches = re.findall(pattern, content)

                      # Find folder mime types to distinguish folders from files
                      folder_ids = set()
                      fp1 = r'"application/vnd\.google-apps\.folder"[^"]{0,200}"([a-zA-Z0-9_-]{20,50})"'
                      fp2 = r'"([a-zA-Z0-9_-]{20,50})"[^"]{0,200}"application/vnd\.google-apps\.folder"'
                      folder_ids.update(re.findall(fp1, content))
                      folder_ids.update(re.findall(fp2, content))

                      seen = set()
                      for item_id, item_name in matches:
                          if item_id in seen or item_id == folder_id:
                              continue
                          if len(item_id) < 20 or len(item_id) > 50:
                              continue
                          # Skip names that look like IDs or JSON
                          if re.match(r'^[a-zA-Z0-9_-]{20,}

      - name: Upload file list
        uses: actions/upload-artifact@v4
        with:
          name: file-list
          path: file_list/
          retention-days: 1

      - name: Display summary
        run: |
          echo "=== File Listing Summary ==="
          cat file_list/summary.json
          echo ""
          echo "First 20 files:"
          python -c "import json; files=json.load(open('file_list/all_files.json')); [print(f['path']) for f in files[:20]]" 2>/dev/null || echo "No files"

  download_files:
    needs: list_files
    if: needs.list_files.outputs.total_files != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install gdown
        run: pip install gdown

      - name: Download file list
        uses: actions/download-artifact@v4
        with:
          name: file-list
          path: file_list/

      - name: Create downloads directory
        run: mkdir -p downloads

      - name: Download files
        env:
          BATCH_SIZE: ${{ github.event.inputs.batch_size }}
          DELAY_BETWEEN_FILES: ${{ github.event.inputs.delay_between_files }}
        run: |
          cat << 'PYTHON_SCRIPT' > download_files.py
          import os
          import json
          import time
          import gdown
          from pathlib import Path

          def download_file(file_id, output_path, max_retries=3):
              Path(output_path).parent.mkdir(parents=True, exist_ok=True)

              for attempt in range(max_retries):
                  try:
                      url = f"https://drive.google.com/uc?id={file_id}"
                      result = gdown.download(url, output_path, quiet=False, fuzzy=True)

                      if result and Path(output_path).exists() and Path(output_path).stat().st_size > 0:
                          size_mb = Path(output_path).stat().st_size / 1024 / 1024
                          print(f"  ✓ Downloaded ({size_mb:.2f} MB)")
                          return True
                  except Exception as e:
                      print(f"  ✗ Attempt {attempt + 1} failed: {e}")
                      if "quota" in str(e).lower() or "rate" in str(e).lower():
                          time.sleep(60 * (attempt + 1))

                  if attempt < max_retries - 1:
                      time.sleep(10 * (attempt + 1))

              return False

          def main():
              batch_size = int(os.environ.get('BATCH_SIZE', 25))
              delay = int(os.environ.get('DELAY_BETWEEN_FILES', 2))

              with open('file_list/all_files.json', 'r') as f:
                  all_files = json.load(f)

              if not all_files:
                  print("No files to download!")
                  return

              # Check already downloaded
              downloaded = set()
              for root, dirs, files in os.walk('downloads'):
                  for f in files:
                      if f not in ['README.md', '.gitkeep']:
                          downloaded.add(f)
                          downloaded.add(os.path.relpath(os.path.join(root, f), 'downloads'))

              to_download = [f for f in all_files if f['path'] not in downloaded and f['name'] not in downloaded]

              print(f"Total: {len(all_files)}, Already downloaded: {len(downloaded)}, To download: {len(to_download)}")

              success = 0
              failed = []

              for i, f in enumerate(to_download):
                  print(f"\n[{i+1}/{len(to_download)}] {f['path']}")
                  output_path = os.path.join('downloads', f['path'])

                  if download_file(f['id'], output_path):
                      success += 1
                  else:
                      failed.append(f)

                  if i < len(to_download) - 1:
                      time.sleep(delay)

                  # Batch delay
                  if (i + 1) % batch_size == 0 and i < len(to_download) - 1:
                      print(f"\nBatch complete. Waiting 30s...")
                      time.sleep(30)

              print(f"\n{'='*60}")
              print(f"Downloaded: {success}, Failed: {len(failed)}")

              if failed:
                  with open('file_list/failed.json', 'w') as f:
                      json.dump(failed, f, indent=2)

          if __name__ == "__main__":
              main()
          PYTHON_SCRIPT

          python download_files.py

      - name: Generate README files
        run: |
          find downloads -mindepth 1 -type d | while read -r folder; do
            folder_name=$(basename "$folder")
            echo "# $folder_name" > "$folder/README.md"
            echo "" >> "$folder/README.md"
            echo "| File | Download |" >> "$folder/README.md"
            echo "|------|----------|" >> "$folder/README.md"
            find "$folder" -maxdepth 1 -type f ! -name "README.md" | sort | while read -r file; do
              filename=$(basename "$file")
              echo "| $filename | [Download]($filename) |" >> "$folder/README.md"
            done
          done

      - name: Summary
        run: |
          echo "=== Download Summary ==="
          du -sh downloads/ 2>/dev/null || echo "No files"
          echo "Files: $(find downloads -type f ! -name 'README.md' | wc -l)"

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add --force downloads/
          if ! git diff --staged --quiet; then
            FILE_COUNT=$(find downloads -type f ! -name "README.md" | wc -l)
            git commit -m "📥 Downloaded $FILE_COUNT files from Google Drive"
            git push
          fi
