name: 07 - Download Google Drive Files

on:
  workflow_dispatch:
    inputs:
      drive_folder_url:
        description: 'Google Drive folder URL (public shared link)'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gdown

      - name: Extract folder ID from URL
        id: extract_id
        run: |
          URL="${{ github.event.inputs.drive_folder_url }}"
          if [[ "$URL" =~ folders/([a-zA-Z0-9_-]+) ]]; then
            FOLDER_ID="${BASH_REMATCH[1]}"
          elif [[ "$URL" =~ id=([a-zA-Z0-9_-]+) ]]; then
            FOLDER_ID="${BASH_REMATCH[1]}"
          else
            FOLDER_ID="$URL"
          fi
          echo "folder_id=$FOLDER_ID" >> $GITHUB_OUTPUT
          echo "Extracted folder ID: $FOLDER_ID"

      - name: Create downloads directory
        run: mkdir -p downloads

      - name: Download files with skip existing
        env:
          FOLDER_ID: ${{ steps.extract_id.outputs.folder_id }}
        run: |
          cat << 'PYTHON_SCRIPT' > download_script.py
          import os
          import sys
          from pathlib import Path
          import gdown
          import gdown.download
          import gdown.download_folder

          # Stats tracking
          stats = {'downloaded': 0, 'skipped': 0, 'failed': 0}

          # Store original download function
          original_download = gdown.download

          def get_all_existing_files(base_dir):
              """Get all existing files in directory."""
              existing = set()
              base_path = Path(base_dir)
              if base_path.exists():
                  for f in base_path.rglob('*'):
                      if f.is_file() and f.name != 'README.md':
                          existing.add(str(f.absolute()))
                          existing.add(f.name)
              return existing

          # Get existing files before starting
          EXISTING_FILES = get_all_existing_files('downloads')

          def patched_download(url=None, output=None, quiet=False, proxy=None, speed=None,
                               use_cookies=True, verify=True, id=None, fuzzy=True,
                               resume=False, format=None):
              """Patched download that skips existing files."""
              global stats

              # Determine output path
              if output:
                  out_path = Path(output)
                  filename = out_path.name
                  abs_path = str(out_path.absolute())

                  # Check if file already exists
                  if abs_path in EXISTING_FILES or filename in EXISTING_FILES or out_path.exists():
                      print(f"SKIP (exists): {output}")
                      stats['skipped'] += 1
                      return str(output)

              # File doesn't exist, download it
              print(f"DOWNLOADING: {output}")
              try:
                  result = original_download(
                      url=url, output=output, quiet=quiet, proxy=proxy, speed=speed,
                      use_cookies=use_cookies, verify=verify, id=id, fuzzy=fuzzy,
                      resume=resume, format=format
                  )
                  if result:
                      stats['downloaded'] += 1
                  else:
                      stats['failed'] += 1
                  return result
              except Exception as e:
                  print(f"FAILED: {output} - {e}")
                  stats['failed'] += 1
                  raise

          # Apply monkey patch
          gdown.download = patched_download
          gdown.download_folder.download = patched_download

          def main():
              folder_id = os.environ.get('FOLDER_ID')
              download_dir = 'downloads'

              print("=" * 60)
              print("GOOGLE DRIVE DOWNLOADER - RESUME MODE")
              print("=" * 60)
              print()

              count_before = len([f for f in EXISTING_FILES if '/' in f or '\\' in f])
              print(f"Existing files: {count_before}")

              if count_before > 0:
                  sample = sorted([f for f in EXISTING_FILES if 'downloads' in f])[:5]
                  for f in sample:
                      print(f"  > {f}")
                  if count_before > 5:
                      print(f"  ... and more")
              print()

              print(f"Folder ID: {folder_id}")
              print("Files that exist will be SKIPPED automatically")
              print()
              print("-" * 60)

              # Download using gdown (our patched version)
              url = f"https://drive.google.com/drive/folders/{folder_id}"

              try:
                  gdown.download_folder(url=url, output=download_dir, quiet=False)
              except Exception as e:
                  print(f"\nDownload interrupted: {e}")
                  print("Progress has been saved.")

              print("-" * 60)
              print()

              # Count after
              files_after = get_all_existing_files(download_dir)
              count_after = len([f for f in files_after if 'downloads' in f])

              print("=" * 60)
              print("SUMMARY")
              print("=" * 60)
              print(f"Files before: {count_before}")
              print(f"Files after:  {count_after}")
              print(f"Downloaded:   {stats['downloaded']}")
              print(f"Skipped:      {stats['skipped']}")
              print(f"Failed:       {stats['failed']}")
              print()

              if stats['downloaded'] == 0 and stats['skipped'] > 0 and stats['failed'] == 0:
                  print("ALL FILES ALREADY EXIST - 100% COMPLETE!")
              elif stats['failed'] > 0:
                  print("Some downloads failed (likely rate limited).")
                  print("Run workflow again to continue.")
              elif stats['downloaded'] > 0:
                  print("Progress saved. Run again if more files remain.")

              print("=" * 60)

          if __name__ == "__main__":
              main()
          PYTHON_SCRIPT

          python download_script.py

      - name: Show file count
        run: |
          echo ""
          echo "=== REPOSITORY STATUS ==="
          FILE_COUNT=$(find downloads -type f ! -name "README.md" 2>/dev/null | wc -l)
          echo "Total files in downloads folder: $FILE_COUNT"
          echo ""

      - name: Generate README.md for each folder
        run: |
          find downloads -mindepth 1 -type d | while read -r folder; do
            folder_name=$(basename "$folder")
            readme_path="$folder/README.md"

            echo "# $folder_name" > "$readme_path"
            echo "" >> "$readme_path"
            echo "## Files" >> "$readme_path"
            echo "" >> "$readme_path"
            echo "| File | Download |" >> "$readme_path"
            echo "|------|----------|" >> "$readme_path"

            find "$folder" -maxdepth 1 -type f ! -name "README.md" | sort | while read -r file; do
              filename=$(basename "$file")
              echo "| $filename | [Download]($filename) |" >> "$readme_path"
            done

            echo "" >> "$readme_path"
            echo "---" >> "$readme_path"
            echo "_Auto-generated by GitHub Actions_" >> "$readme_path"
          done

      - name: Commit and push files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add --force downloads/

          if git diff --staged --quiet; then
            echo ""
            echo "=============================================="
            echo "NO NEW FILES TO COMMIT"
            echo "=============================================="
            FILE_COUNT=$(find downloads -type f ! -name "README.md" 2>/dev/null | wc -l)
            echo "Total files: $FILE_COUNT"
            echo ""
            echo "All files are already in repository!"
          else
            FILE_COUNT=$(find downloads -type f ! -name "README.md" | wc -l)
            FOLDER_COUNT=$(find downloads -mindepth 1 -type d | wc -l)

            git commit -m "Update: $FILE_COUNT files in $FOLDER_COUNT folders"
            git push

            echo ""
            echo "=============================================="
            echo "SAVED $FILE_COUNT FILES TO REPOSITORY"
            echo "=============================================="
            echo ""
            echo "Run workflow again if more files remain."
          fi

      - name: Cleanup
        run: rm -f download_script.py
