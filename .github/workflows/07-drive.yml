name: 07 - Download Google Drive Files

on:
  workflow_dispatch:
    inputs:
      drive_folder_url:
        description: 'Google Drive folder URL (public shared link)'
        required: true
        type: string
      batch_size:
        description: 'Number of files to download per batch (default: 25)'
        required: false
        default: '25'
        type: string
      delay_between_files:
        description: 'Delay in seconds between individual files (default: 2)'
        required: false
        default: '2'
        type: string

jobs:
  list_files:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      folder_id: ${{ steps.extract_id.outputs.folder_id }}
      total_files: ${{ steps.list.outputs.total_files }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gdown

      - name: Extract folder ID from URL
        id: extract_id
        run: |
          URL="${{ github.event.inputs.drive_folder_url }}"
          if [[ "$URL" =~ folders/([a-zA-Z0-9_-]+) ]]; then
            FOLDER_ID="${BASH_REMATCH[1]}"
          elif [[ "$URL" =~ id=([a-zA-Z0-9_-]+) ]]; then
            FOLDER_ID="${BASH_REMATCH[1]}"
          else
            FOLDER_ID="$URL"
          fi
          echo "folder_id=$FOLDER_ID" >> $GITHUB_OUTPUT
          echo "Extracted folder ID: $FOLDER_ID"

      - name: List all files
        id: list
        env:
          FOLDER_ID: ${{ steps.extract_id.outputs.folder_id }}
        run: |
          python3 << 'EOF'
          import os
          import json
          import time
          import gdown

          def list_folder_recursive(folder_id, path_prefix="", depth=0):
              indent = "  " * depth
              print(f"{indent}Listing folder: {folder_id} (path: {path_prefix or '/'})")

              all_files = []

              for attempt in range(3):
                  try:
                      # gdown.download_folder with skip_download=True lists without downloading
                      files = gdown.download_folder(
                          id=folder_id,
                          output="/tmp/gdown_probe",
                          skip_download=True,
                          quiet=False,
                          use_cookies=False,
                      )
                      break
                  except Exception as e:
                      print(f"{indent}  Attempt {attempt+1} failed: {e}")
                      if attempt < 2:
                          time.sleep(5)
                      files = []

              # gdown returns a list of local paths it *would* write.
              # We need IDs and names — use gdown's internal retrieve function instead.
              return all_files

          # --------------------------------------------------------------------------
          # Better approach: use gdown's internal API helper directly to get file list
          # --------------------------------------------------------------------------
          import re
          import requests

          def gdrive_folder_contents(folder_id, session):
              """
              Uses the same internal Drive v3-like endpoint that gdown uses.
              Returns list of dicts: {id, name, mimeType}
              """
              url = "https://drive.google.com/drive/folders/" + folder_id
              # First, get the page to extract the key/metadata
              # gdown uses this endpoint to list folder contents:
              api_url = (
                  "https://drive.google.com/drive/folders/" + folder_id
              )

              # Use gdown's retrieve_json which calls the internal 'drive' endpoint
              # Replicate what gdown does: fetch _getFolderContents endpoint
              contents_url = (
                  "https://clients6.google.com/drive/v2beta/files"
                  f"?openDrive=false&reason=102&syncType=0&errorRecovery=false"
                  f"&q=trashed%3Dfalse+and+%27{folder_id}%27+in+parents"
                  f"&fields=kind,nextPageToken,items(kind,fileSize,mimeType,teamDriveId,"
                  f"id,title,labels(trashed),alternateLink)"
                  f"&appDataFilter=NO_APP_DATA&spaces=drive&maxResults=1000"
                  f"&orderBy=folder,title&retries=0&includeItemsFromAllDrives=true"
                  f"&supportsAllDrives=true&pageToken="
              )

              items = []
              page_token = ""
              while True:
                  paged_url = contents_url + page_token
                  resp = session.get(paged_url, timeout=30)
                  if resp.status_code != 200:
                      print(f"  API returned {resp.status_code}")
                      break
                  try:
                      data = resp.json()
                  except Exception:
                      print("  Failed to parse JSON response")
                      break
                  items.extend(data.get("items", []))
                  page_token = data.get("nextPageToken", "")
                  if not page_token:
                      break
                  time.sleep(0.5)
              return items

          def list_folder_recursive_v2(folder_id, path_prefix="", session=None, depth=0):
              if session is None:
                  session = requests.Session()
                  session.headers.update({
                      "User-Agent": (
                          "Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
                          "AppleWebKit/537.36 (KHTML, like Gecko) "
                          "Chrome/124.0.0.0 Safari/537.36"
                      )
                  })

              indent = "  " * depth
              print(f"{indent}Listing: {folder_id} (path: {path_prefix or '/'})")

              all_files = []
              for attempt in range(3):
                  try:
                      items = gdrive_folder_contents(folder_id, session)
                      break
                  except Exception as e:
                      print(f"{indent}  Attempt {attempt+1} failed: {e}")
                      if attempt < 2:
                          time.sleep(5)
                      items = []

              FOLDER_MIME = "application/vnd.google-apps.folder"
              files = [i for i in items if i.get("mimeType") != FOLDER_MIME]
              folders = [i for i in items if i.get("mimeType") == FOLDER_MIME]

              print(f"{indent}  Found {len(files)} files, {len(folders)} subfolders")

              for f in files:
                  name = f.get("title", f["id"])
                  file_path = os.path.join(path_prefix, name) if path_prefix else name
                  print(f"{indent}    [FILE] {name}")
                  all_files.append({"id": f["id"], "name": name, "path": file_path})

              for folder in folders:
                  name = folder.get("title", folder["id"])
                  subfolder_path = os.path.join(path_prefix, name) if path_prefix else name
                  print(f"{indent}    [FOLDER] {name}")
                  time.sleep(1)
                  sub_files = list_folder_recursive_v2(
                      folder["id"], subfolder_path, session, depth + 1
                  )
                  all_files.extend(sub_files)

              return all_files

          # ── Main ──────────────────────────────────────────────────────────────────
          folder_id = os.environ["FOLDER_ID"]
          print("=" * 60)
          print(f"Listing folder: {folder_id}")
          print("=" * 60)

          all_files = list_folder_recursive_v2(folder_id)

          # Deduplicate by ID
          seen = set()
          unique_files = []
          for f in all_files:
              if f["id"] not in seen:
                  seen.add(f["id"])
                  unique_files.append(f)
          all_files = unique_files

          os.makedirs("file_list", exist_ok=True)
          with open("file_list/all_files.json", "w") as fh:
              json.dump(all_files, fh, indent=2)
          with open("file_list/summary.json", "w") as fh:
              json.dump({"total_files": len(all_files), "folder_id": folder_id}, fh, indent=2)

          print(f"\nTotal files found: {len(all_files)}")
          if all_files:
              print("\nFirst 20 files:")
              for f in all_files[:20]:
                  print(f"  - {f['path']}")

          github_output = os.environ.get("GITHUB_OUTPUT", "/dev/null")
          with open(github_output, "a") as fh:
              fh.write(f"total_files={len(all_files)}\n")
          EOF

      - name: Upload file list
        uses: actions/upload-artifact@v4
        with:
          name: file-list
          path: file_list/
          retention-days: 1

      - name: Display summary
        run: |
          echo "=== File Listing Summary ==="
          cat file_list/summary.json
          echo ""
          echo "First 20 files:"
          python3 -c "
          import json
          files = json.load(open('file_list/all_files.json'))
          for f in files[:20]:
              print(f['path'])
          " 2>/dev/null || echo "No files found"

  download_files:
    needs: list_files
    if: needs.list_files.outputs.total_files != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install gdown
        run: pip install gdown

      - name: Download file list
        uses: actions/download-artifact@v4
        with:
          name: file-list
          path: file_list/

      - name: Create downloads directory
        run: mkdir -p downloads

      - name: Download files
        env:
          BATCH_SIZE: ${{ github.event.inputs.batch_size }}
          DELAY_BETWEEN_FILES: ${{ github.event.inputs.delay_between_files }}
        run: |
          python3 << 'EOF'
          import os
          import json
          import time
          import gdown
          from pathlib import Path

          def download_file(file_id, output_path, max_retries=3):
              Path(output_path).parent.mkdir(parents=True, exist_ok=True)
              for attempt in range(max_retries):
                  try:
                      url = f"https://drive.google.com/uc?id={file_id}"
                      result = gdown.download(url, output_path, quiet=False, fuzzy=True)
                      if result and Path(output_path).exists() and Path(output_path).stat().st_size > 0:
                          size_mb = Path(output_path).stat().st_size / 1024 / 1024
                          print(f"  Downloaded ({size_mb:.2f} MB)")
                          return True
                  except Exception as e:
                      print(f"  Attempt {attempt + 1} failed: {e}")
                      if "quota" in str(e).lower() or "rate" in str(e).lower():
                          time.sleep(60 * (attempt + 1))
                  if attempt < max_retries - 1:
                      time.sleep(10 * (attempt + 1))
              return False

          batch_size = int(os.environ.get('BATCH_SIZE', 25))
          delay = int(os.environ.get('DELAY_BETWEEN_FILES', 2))

          with open('file_list/all_files.json', 'r') as f:
              all_files = json.load(f)

          if not all_files:
              print("No files to download!")
              exit(0)

          # Collect already-downloaded paths to allow resuming
          downloaded = set()
          for root, dirs, files in os.walk('downloads'):
              for f in files:
                  if f not in ['README.md', '.gitkeep']:
                      downloaded.add(f)
                      downloaded.add(os.path.relpath(os.path.join(root, f), 'downloads'))

          to_download = [
              f for f in all_files
              if f['path'] not in downloaded and f['name'] not in downloaded
          ]
          print(f"Total: {len(all_files)}, Already downloaded: {len(all_files) - len(to_download)}, To download: {len(to_download)}")

          success = 0
          failed = []
          for i, f in enumerate(to_download):
              print(f"\n[{i+1}/{len(to_download)}] {f['path']}")
              output_path = os.path.join('downloads', f['path'])
              if download_file(f['id'], output_path):
                  success += 1
              else:
                  failed.append(f)
              if i < len(to_download) - 1:
                  time.sleep(delay)
              if (i + 1) % batch_size == 0 and i < len(to_download) - 1:
                  print(f"\nBatch complete. Waiting 30s...")
                  time.sleep(30)

          print(f"\n{'='*60}")
          print(f"Downloaded: {success}, Failed: {len(failed)}")
          if failed:
              with open('file_list/failed.json', 'w') as f:
                  json.dump(failed, f, indent=2)
              print("Failed files:")
              for f in failed:
                  print(f"  - {f['path']}")
          EOF

      - name: Generate README files
        run: |
          find downloads -mindepth 1 -type d | while read -r folder; do
            folder_name=$(basename "$folder")
            echo "# $folder_name" > "$folder/README.md"
            echo "" >> "$folder/README.md"
            echo "| File | Download |" >> "$folder/README.md"
            echo "|------|----------|" >> "$folder/README.md"
            find "$folder" -maxdepth 1 -type f ! -name "README.md" | sort | while read -r file; do
              filename=$(basename "$file")
              echo "| $filename | [Download]($filename) |" >> "$folder/README.md"
            done
          done

      - name: Summary
        run: |
          echo "=== Download Summary ==="
          du -sh downloads/ 2>/dev/null || echo "No files"
          echo "Files: $(find downloads -type f ! -name 'README.md' | wc -l)"

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add --force downloads/
          if ! git diff --staged --quiet; then
            FILE_COUNT=$(find downloads -type f ! -name "README.md" | wc -l)
            git commit -m "Downloaded $FILE_COUNT files from Google Drive"
            git push
          fi
